<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Orbit - Real Glass Effect</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
        #blocker { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer; }
        #instructions { color: black; text-align: center; padding: 30px; border: 2px solid #333; border-radius: 10px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 10px 0; color: #333; } p { margin: 0; color: #666; }
        #actions { position: absolute; bottom: 40px; right: 40px; z-index: 100; }
        button.main-btn { background: #333; color: #fff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 18px; border-radius: 50px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        button.main-btn:hover { background: #000; transform: translateY(-2px); }
        #status { position: absolute; bottom: 40px; left: 40px; color: #333; font-size: 14px; z-index: 100; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1>CINEMATIC TOUR</h1>
            <p>Click to start.<br>The card is now real frosted glass.</p>
        </div>
    </div>

    <div id="actions">
        <button class="main-btn" onclick="nextStation()">NEXT STATION ➡️</button>
    </div>

    <div id="status">Ready...</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambientLight);
        const spotLight = new THREE.SpotLight(0xffeeff, 2); spotLight.position.set(0, 10, 0); spotLight.angle = Math.PI / 4; spotLight.penumbra = 0.5; spotLight.decay = 1; spotLight.distance = 50; spotLight.castShadow = true; scene.add(spotLight); spotLight.target.position.set(-0.006, 1.041, -0.008);
        const centerLight = new THREE.PointLight(0xff00ff, 1, 10); centerLight.position.set(-0.006, 1.041, -0.008); scene.add(centerLight);

        // --- ✨ VISIBLE GLOW ORB (Actually see the glow!) ✨ ---
        const glowGeometry = new THREE.SphereGeometry(0.15, 16, 16);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0xff00ff,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const glowOrb = new THREE.Mesh(glowGeometry, glowMaterial);
        glowOrb.position.copy(centerLight.position);
        scene.add(glowOrb);

        // Add a larger, softer glow halo using a sprite
        const spriteTexture = new THREE.CanvasTexture(createGlowTexture());
        const spriteMaterial = new THREE.SpriteMaterial({
            map: spriteTexture,
            color: 0xff00ff,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            opacity: 0.6
        });
        const glowSprite = new THREE.Sprite(spriteMaterial);
        glowSprite.position.copy(centerLight.position);
        glowSprite.scale.set(1.2, 1.2, 1);
        scene.add(glowSprite);

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255, 0, 255, 0.9)');
            gradient.addColorStop(0.3, 'rgba(255, 0, 255, 0.4)');
            gradient.addColorStop(1, 'rgba(255, 0, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            return canvas;
        }

        // --- REAL GLASS CARD ---
        const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
        const context = canvas.getContext('2d');
        
        context.fillStyle = 'rgba(255, 255, 255, 0.4)'; 
        context.fillRect(0, 0, 512, 512);
        context.strokeStyle = '#ffffff'; context.lineWidth = 20; context.strokeRect(20, 20, 472, 472);
        context.font = 'bold 50px Arial'; context.fillStyle = '#333'; context.textAlign = 'center';
        context.fillText("INFO", 256, 200);
        context.font = '30px Arial'; context.fillStyle = '#555';
        context.fillText("Viewpoint C", 256, 280);
        
        const pageTexture = new THREE.CanvasTexture(canvas);
        
        const pageMaterial = new THREE.MeshStandardMaterial({ 
            map: pageTexture,
            transparent: true,
            opacity: 0.8,
            roughness: 0.1,
            metalness: 0.1,
            side: THREE.DoubleSide,
            depthWrite: false,
            blending: THREE.NormalBlending
        });
        
        const pageGeometry = new THREE.PlaneGeometry(1.5, 1.5);
        const floatingPage = new THREE.Mesh(pageGeometry, pageMaterial);
        floatingPage.position.set(-3.61, 1.30, 1.17);
        floatingPage.lookAt(new THREE.Vector3(-0.006, 1.30, -0.008)); 
        const INITIAL_QUATERNION = floatingPage.quaternion.clone();
        scene.add(floatingPage);

        // --- STATIONS ---
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 2.5;

        // --- ✨ RANDOM GLOW PULSE STATE ✨ ---
        let glowPulse = {
            active: false,
            nextTrigger: performance.now() + 2000 + Math.random() * 4000,
            pulseStart: 0,
            pulseDuration: 0,
            baseScale: 1,
            baseOpacity: 0.9
        };

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => { 
                if (child.isMesh) { 
                    child.castShadow = true; 
                    child.receiveShadow = true; 
                    if (child.name.toLowerCase().includes('tree')) { 
                        child.material.emissive = new THREE.Color(0xaa00aa); 
                        child.material.emissiveIntensity = 0.5; 
                    } 
                } 
            });
            scene.add(model);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
        }, undefined, function (error) { console.error(error); });

        // --- UI LOGIC ---
        document.getElementById('blocker').addEventListener('click', function() { 
            this.style.display = 'none'; 
            document.getElementById('status').innerText = "Tour Started"; 
        });

        window.nextStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) currentStationIndex = 1;
            else currentStationIndex = (currentStationIndex % (STATIONS.length - 1)) + 1;
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
        };

        function startAnimation(targetPos) {
            isAnimating = true; 
            animationProgress = 0; 
            startPos.copy(camera.position); 
            endPos.copy(targetPos);
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2)); 
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

        // --- ✨ UPDATE VISIBLE GLOW PULSE ✨ ---
        function updateVisibleGlow() {
            const now = performance.now();
            
            // Trigger new random pulse
            if (!glowPulse.active && now > glowPulse.nextTrigger) {
                glowPulse.active = true;
                glowPulse.pulseStart = now;
                glowPulse.pulseDuration = 400 + Math.random() * 600; // 400-1000ms
            }
            
            if (glowPulse.active) {
                const elapsed = now - glowPulse.pulseStart;
                if (elapsed < glowPulse.pulseDuration) {
                    const t = elapsed / glowPulse.pulseDuration;
                    const pulse = 1 + Math.sin(t * Math.PI) * 0.7; // 1x → 1.7x → 1x
                    
                    // Pulse the orb scale
                    const targetScale = glowPulse.baseScale * pulse;
                    glowOrb.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.2);
                    glowSprite.scale.lerp(new THREE.Vector3(1.2 * pulse, 1.2 * pulse, 1), 0.2);
                    
                    // Pulse opacity
                    const targetOpacity = glowPulse.baseOpacity * (0.7 + 0.3 * pulse);
                    glowOrb.material.opacity = THREE.MathUtils.lerp(glowOrb.material.opacity, targetOpacity, 0.2);
                    glowSprite.material.opacity = THREE.MathUtils.lerp(glowSprite.material.opacity, targetOpacity * 0.7, 0.2);
                    
                    // Also pulse the actual light for illumination
                    centerLight.intensity = THREE.MathUtils.lerp(centerLight.intensity, 1 * pulse, 0.2);
                    
                } else {
                    // Reset after pulse
                    glowOrb.scale.lerp(new THREE.Vector3(glowPulse.baseScale, glowPulse.baseScale, glowPulse.baseScale), 0.1);
                    glowSprite.scale.lerp(new THREE.Vector3(1.2, 1.2, 1), 0.1);
                    glowOrb.material.opacity = THREE.MathUtils.lerp(glowOrb.material.opacity, glowPulse.baseOpacity, 0.1);
                    glowSprite.material.opacity = THREE.MathUtils.lerp(glowSprite.material.opacity, glowPulse.baseOpacity * 0.7, 0.1);
                    centerLight.intensity = THREE.MathUtils.lerp(centerLight.intensity, 1, 0.1);
                    
                    glowPulse.active = false;
                    glowPulse.nextTrigger = now + 2000 + Math.random() * 4000; // Next in 2-6s
                }
            }
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // ✨ Update visible glow pulse ✨
            updateVisibleGlow();

            // GLASS LOGIC
            const distToC = camera.position.distanceTo(STATIONS[1].pos);
            
            if (distToC < 2.5) {
                floatingPage.lookAt(camera.position);
                floatingPage.material.opacity = THREE.MathUtils.lerp(floatingPage.material.opacity, 0.4, 0.1);
            } else {
                floatingPage.quaternion.slerp(INITIAL_QUATERNION, 0.1);
                floatingPage.material.opacity = THREE.MathUtils.lerp(floatingPage.material.opacity, 0.05, 0.1); // 5% opacity
            }

            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) { 
                    animationProgress = 1; 
                    isAnimating = false; 
                    document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`; 
                }
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start; 
                const p1 = window.animControlPoints.mid; 
                const p2 = window.animControlPoints.end;
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
