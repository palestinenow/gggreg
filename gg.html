<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My 3D Model - Fixed Colors</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
    }
    .potions {
      position: absolute;
      bottom: 30px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      pointer-events: none;
    }
    .potion-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 24px;
      font-weight: bold;
      border: 3px solid #fff;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    .potion-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #ff00ff;
      background: rgba(255, 0, 255, 0.3);
    }
    .potion-btn.active {
      background: #ff00ff;
      box-shadow: 0 0 25px #ff00ff, inset 0 0 10px #fff;
    }
  </style>
</head>
<body>
  <div id="loading">Loading 3D world...</div>

  <div class="potions">
    <button class="potion-btn active" data-cam="home">1</button>
    <button class="potion-btn" data-cam="car">2</button>
    <button class="potion-btn" data-cam="person">3</button>
    <button class="potion-btn" data-cam="sign">4</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const CAMERAS = {
      home:    { pos: [0, 5, 15],   target: [0, 0, 0] },
      car:     { pos: [-5, 2, 8],   target: [-3, 1, -2] },
      person:  { pos: [5, 1.5, 6],  target: [3, 0.5, -1] },
      sign:    { pos: [-8, 3, 10],  target: [-7, 2, -5] },
    };

    let activeCam = 'home';
    let isAnimating = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(...CAMERAS.home.pos);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(...CAMERAS.home.target);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // === LOAD MODEL WITH DEBUGGING ===
    const loader = new GLTFLoader();
    loader.load(
      './droid-workshop-kitchen.gltf',
      function (gltf) {
        const model = gltf.scene;
        let hasTextureIssues = false;

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;

            if (!child.material.map && child.material.name !== 'default') {
              console.warn(`⚠️ Mesh "${child.name}" has NO TEXTURE — might appear gray.`);
              hasTextureIssues = true;
            } else if (child.material.map) {
              console.log(`✅ Mesh "${child.name}" has texture loaded.`);
            }
          }
        });

        if (hasTextureIssues) {
          alert("Some parts may still be gray — check browser console for details.");
        }

        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        controls.target.copy(center);
        camera.position.set(center.x, center.y + 5, center.z + 10);

        document.getElementById('loading').style.display = 'none';
      },
      undefined,
      function (error) {
        console.error('❌ Error loading model:', error);
        document.getElementById('loading').innerText = 'Failed to load model. Check console.';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function moveToCamera(camName) {
      if (isAnimating || camName === activeCam) return;
      isAnimating = true;
      activeCam = camName;

      document.querySelectorAll('.potion-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.cam === camName) btn.classList.add('active');
      });

      const targetPos = new THREE.Vector3(...CAMERAS[camName].pos);
      const targetLook = new THREE.Vector3(...CAMERAS[camName].target);

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();

      let progress = 0;
      const duration = 1.5;

      function animateCamera() {
        progress += 0.016 / duration;
        if (progress >= 1) progress = 1;

        camera.position.lerpVectors(startPos, targetPos, progress);
        controls.target.lerpVectors(startTarget, targetLook, progress);
        controls.update();

        if (progress < 1) {
          requestAnimationFrame(animateCamera);
        } else {
          isAnimating = false;
        }
      }

      animateCamera();
    }

    document.querySelectorAll('.potion-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        moveToCamera(btn.dataset.cam);
      });
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
