<!DOCTYPE html>
<html>
<head>
    <title>Simple 3D Walk</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: white; font-family: Arial; font-size: 20px; pointer-events: none;
            z-index: 100; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="info">Click screen to Start<br>WASD to Move | Mouse to Look | ESC to Stop</div>

    <!-- Load Three.js from a reliable CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Basic Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue background so you know it's working
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lights (Bright so we see colors)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // 3. Controls
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('info');

        document.addEventListener('click', () => {
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            instructions.style.display = 'none';
        });

        controls.addEventListener('unlock', () => {
            instructions.style.display = 'block';
        });

        // 4. Movement Variables
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;

        const onKeyDown = (event) => {
            switch (event.code) {
                case 'KeyW': case 'ArrowUp': case 'KeyZ': moveForward = true; break;
                case 'KeyA': case 'ArrowLeft': case 'KeyQ': moveLeft = true; break;
                case 'KeyS': case 'ArrowDown': moveBackward = true; break;
                case 'KeyD': case 'ArrowRight': moveRight = true; break;
            }
        };

        const onKeyUp = (event) => {
            switch (event.code) {
                case 'KeyW': case 'ArrowUp': case 'KeyZ': moveForward = false; break;
                case 'KeyA': case 'ArrowLeft': case 'KeyQ': moveLeft = false; break;
                case 'KeyS': case 'ArrowDown': moveBackward = false; break;
                case 'KeyD': case 'ArrowRight': moveRight = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // 5. Load Model
        const loader = new GLTFLoader();
        loader.load('./droid-workshop-kitchen.gltf', function (gltf) {
            const model = gltf.scene;
            scene.add(model);
            
            // Center camera on model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            camera.position.set(center.x, center.y + 5, center.z + 10);
            
            console.log("Model Loaded");
        }, undefined, function (error) {
            console.error(error);
            instructions.innerText = "ERROR: Could not load model. Check Console (F12).";
        });

        // 6. Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                // Simple movement logic
                if (moveForward) controls.moveForward(0.1);
                if (moveBackward) controls.moveForward(-0.1);
                if (moveLeft) controls.moveRight(-0.1);
                if (moveRight) controls.moveRight(0.1);
            }

            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
