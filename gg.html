<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Orbit - Old Standard TT</title>
    
    <!-- IMPORT OLD STANDARD TT FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Old Standard TT', serif; }
        
        /* START SCREEN */
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.95);
            display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer;
        }
        #instructions {
            color: black; text-align: center; padding: 30px; border: 1px solid #ddd;
            border-radius: 10px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { margin: 0 0 10px 0; color: #333; font-size: 64px; font-weight: 700; letter-spacing: 2px; }
        p { margin: 0; color: #666; font-size: 24px; font-weight: 400; }

        /* MAIN BUTTON */
        #actions { position: absolute; bottom: 40px; right: 40px; z-index: 100; }
        button.main-btn {
            background: #000; color: #fff; border: none; padding: 15px 40px;
            font-family: 'Old Standard TT', serif; font-size: 24px; font-weight: 700; cursor: pointer;
            border-radius: 50px; transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); letter-spacing: 1px;
        }
        button.main-btn:hover { background: #333; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

        #status { 
            position: absolute; bottom: 40px; left: 40px; 
            color: #333; font-size: 24px; font-weight: 400; z-index: 100; opacity: 0.6; letter-spacing: 1px;
        }

        /* CONTROL PANEL STYLES */
        #control-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border: 1px solid #ddd; border-radius: 10px; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 220px;
            font-family: sans-serif;
        }
        #control-panel h3 { margin: 0 0 15px 0; font-size: 14px; color: #333; text-transform: uppercase; letter-spacing: 1px; }
        .selector { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .coord-box { background: #f9f9f9; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 12px; color: #555; line-height: 1.5; }
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .control-label { font-size: 12px; color: #666; font-weight: bold; }
        .btn-group { display: flex; gap: 5px; }
        .ctrl-btn { width: 30px; height: 30px; border: 1px solid #ccc; background: #eee; border-radius: 4px; cursor: pointer; font-weight: bold; color: #333; }
        .ctrl-btn:hover { background: #ddd; }
        .ctrl-btn:active { background: #333; color: white; }
        input[type=range] { width: 100px; }
    </style>
</head>
<body>

    <!-- START SCREEN -->
    <div id="blocker">
        <div id="instructions">
            <h1>Cinematic Tour</h1>
            <p>Click to start<br>Old Standard TT Edition</p>
        </div>
    </div>

    <!-- CONTROL PANEL -->
    <div id="control-panel">
        <h3>Edit Card Position & Size</h3>
        <select class="selector" id="card-selector" onchange="updateSelectedCard()">
            <option value="C">Card C</option>
            <option value="D">Card D</option>
            <option value="E">Card E</option>
            <option value="F">Card F</option>
            <option value="G">Card G (Overview)</option>
        </select>
        <div class="coord-box" id="coord-display">Select a card...</div>
        <div class="control-row">
            <span class="control-label">Vertical Pos (Y)</span>
            <div class="btn-group">
                <button class="ctrl-btn" onclick="moveSelected('up')">▲ Up</button>
                <button class="ctrl-btn" onclick="moveSelected('down')">▼ Down</button>
            </div>
        </div>
        <div class="control-row">
            <span class="control-label">Text Size</span>
            <input type="range" min="0.5" max="2.0" step="0.1" value="1.0" id="size-slider" oninput="resizeSelected(this.value)">
        </div>
    </div>

    <!-- MAIN ACTION -->
    <div id="actions">
        <button class="main-btn" onclick="nextStation()">Next Station ➡️</button>
    </div>

    <div id="status">Ready...</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambientLight);
        const spotLight = new THREE.SpotLight(0xffeeff, 2); spotLight.position.set(0, 10, 0); spotLight.angle = Math.PI / 4; spotLight.penumbra = 0.5; spotLight.decay = 1; spotLight.distance = 50; spotLight.castShadow = true; scene.add(spotLight); spotLight.target.position.set(-0.006, 1.041, -0.008);
        const centerLight = new THREE.PointLight(0xff00ff, 1, 10); centerLight.position.set(-0.006, 1.041, -0.008); scene.add(centerLight);

        // --- GLOBAL VARIABLES FOR CONTROLS ---
        let selectedCardKey = 'C';
        let cards = {};

        // --- HELPER TO CREATE OLD STANDARD TT TEXT CARDS (NO BACKGROUND) ---
        function createCard(textTitle, textSub, x, y, z) {
            const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
            const context = canvas.getContext('2d');
            
            // NO BACKGROUND - Transparent

            // Text Title - WHITE
            context.font = 'bold 140px "Old Standard TT"'; 
            context.fillStyle = '#ffffff'; context.textAlign = 'center';
            context.fillText(textTitle, 512, 400);
            
            // Text Subtitle - WHITE (slightly softer)
            context.font = 'italic 90px "Old Standard TT"'; 
            context.fillStyle = '#eeeeee';
            context.fillText(textSub, 512, 550);
            
            const texture = new THREE.CanvasTexture(canvas);
            
            // Use MeshStandardMaterial for better lighting/shine potential
            const material = new THREE.MeshStandardMaterial({ 
                map: texture, 
                transparent: true, 
                opacity: 1.0, 
                side: THREE.DoubleSide, 
                depthWrite: false,
                roughness: 0.5,
                metalness: 0.1
            });
            
            const geometry = new THREE.PlaneGeometry(3, 3); 
            const mesh = new THREE.Mesh(geometry, material);
            
            mesh.position.set(x, y, z);
            mesh.lookAt(new THREE.Vector3(-0.006, y, -0.008)); 
            
            // Store data for random animation
            mesh.userData.baseScale = 1.0;
            mesh.userData.randomOffset = Math.random() * 1000;
            mesh.userData.originalPos = mesh.position.clone();
            
            return mesh;
        }

        // --- CREATE CARDS WITH FIXED POSITIONS ---
        
        // Intro
        const cardIntro = createCard("Welcome", "Start", 0.092, 9.5, -0.067);
        const qIntro = cardIntro.quaternion.clone();

        // Card C
        const cardC = createCard("Viewpoint C", "Detail One", -3.49, 1.30, 1.23);
        const qC = cardC.quaternion.clone();
        cards['C'] = cardC;

        // Card D
        const cardD = createCard("Viewpoint D", "Detail Two", 0.08, 1.10, 4.00);
        const qD = cardD.quaternion.clone();
        cards['D'] = cardD;

        // Card E
        const cardE = createCard("Viewpoint E", "Detail Three", 3.77, 1.10, 1.30);
        const qE = cardE.quaternion.clone();
        cards['E'] = cardE;

        // Card F
        const cardF = createCard("Viewpoint F", "Detail Four", 2.21, 0.90, -3.16);
        const qF = cardF.quaternion.clone();
        cards['F'] = cardF;

        // Card G (Overview) - ENSURED IT IS ADDED
        const cardG = createCard("Overview", "Wide View", -3.403, 2.5, -4.008);
        const qG = cardG.quaternion.clone();
        cards['G'] = cardG;

        // ADD ALL CARDS TO SCENE
        scene.add(cardIntro); 
        scene.add(cardC); scene.add(cardD); scene.add(cardE); scene.add(cardF); scene.add(cardG);

        // --- STATIONS (Path: Intro -> G -> C -> D -> E -> F -> Loop G) ---
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067), card: cardIntro, quat: qIntro },
            { name: "G: Overview", pos: new THREE.Vector3(-3.403, 1.240, -4.008), card: cardG, quat: qG },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727), card: cardC, quat: qC },
            { name: "D: Second", pos: new THREE.Vector3(0.077, 1.301, 5.964), card: cardD, quat: qD },
            { name: "E: Third", pos: new THREE.Vector3(5.276, 1.338, 1.737), card: cardE, quat: qE },
            { name: "F: Fourth", pos: new THREE.Vector3(3.257, 1.258, -4.664), card: cardF, quat: qF }
        ];

        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 3.0;

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; if (child.name.toLowerCase().includes('tree')) { child.material.emissive = new THREE.Color(0xaa00aa); child.material.emissiveIntensity = 0.5; } } });
            scene.add(model);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
        }, undefined, function (error) { console.error(error); });

        // --- UI LOGIC ---
        document.getElementById('blocker').addEventListener('click', function() { this.style.display = 'none'; document.getElementById('status').innerText = "Tour Started"; });

        // --- CONTROL FUNCTIONS ---
        window.updateSelectedCard = function() {
            selectedCardKey = document.getElementById('card-selector').value;
            updateCoordDisplay();
        };

        window.moveSelected = function(dir) {
            const card = cards[selectedCardKey];
            if(!card) return;
            if(dir === 'up') card.position.y += 0.2;
            if(dir === 'down') card.position.y -= 0.2;
            card.lookAt(new THREE.Vector3(-0.006, card.position.y, -0.008));
            updateCoordDisplay();
        };

        window.resizeSelected = function(val) {
            const card = cards[selectedCardKey];
            if(!card) return;
            const scale = parseFloat(val);
            card.scale.set(scale, scale, scale);
        };

        function updateCoordDisplay() {
            const card = cards[selectedCardKey];
            if(!card) return;
            const p = card.position;
            const s = card.scale.x;
            document.getElementById('coord-display').innerHTML = 
                `<strong>Card ${selectedCardKey}:</strong><br>X: ${p.x.toFixed(2)}<br>Y: ${p.y.toFixed(2)}<br>Z: ${p.z.toFixed(2)}<br>Size: ${s.toFixed(1)}`;
            document.getElementById('size-slider').value = s;
        }
        updateSelectedCard();

        window.nextStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) currentStationIndex = 1;
            else if (currentStationIndex === 5) currentStationIndex = 1;
            else currentStationIndex++;
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
        };

        function startAnimation(targetPos) {
            isAnimating = true; animationProgress = 0; startPos.copy(camera.position); endPos.copy(targetPos);
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2)); 
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Shine/Blur Animation Logic
            STATIONS.forEach(station => {
                if(station.card && station.card.userData) {
                    const dist = camera.position.distanceTo(station.pos);
                    if (dist < 2.5) {
                        // AT STATION: Face Camera & 100% Opacity & Sharp
                        station.card.lookAt(camera.position);
                        station.card.material.opacity = THREE.MathUtils.lerp(station.card.material.opacity, 1.0, 0.1);
                        station.card.material.roughness = THREE.MathUtils.lerp(station.card.material.roughness, 0.1, 0.1); // Sharp
                        
                        // Stop random movement when focused
                        if(station.card.userData.originalPos) {
                            station.card.position.lerp(station.card.userData.originalPos, 0.1);
                            station.card.scale.setScalar(station.card.userData.baseScale); // Reset scale
                        }
                    } else {
                        // AWAY: Return to Original Rotation & Ghostly/Shiny
                        if(station.quat) {
                            station.card.quaternion.slerp(station.quat, 0.1);
                        }
                        
                        // Animate Opacity for "Shine" effect (pulse between 0.05 and 0.15)
                        const pulse = Math.sin(time * 2 + station.userData.randomOffset) * 0.05 + 0.1;
                        station.card.material.opacity = THREE.MathUtils.lerp(station.card.material.opacity, pulse, 0.1);
                        
                        // Animate Roughness for "Blur" effect (pulse between 0.8 and 1.0)
                        station.card.material.roughness = THREE.MathUtils.lerp(station.card.material.roughness, 0.9, 0.1);

                        // RANDOM FLOAT EFFECT
                        if(station.card.userData.originalPos && station.card.userData.randomOffset !== undefined) {
                            const offset = station.card.userData.randomOffset;
                            station.card.position.y = station.card.userData.originalPos.y + Math.sin(time + offset) * 0.1;
                            station.card.position.x = station.card.userData.originalPos.x + Math.cos(time + offset * 0.5) * 0.05;
                            
                            // Slight scale pulse for "shine"
                            const scalePulse = 1.0 + Math.sin(time * 3 + offset) * 0.05;
                            station.card.scale.setScalar(scalePulse);
                        }
                    }
                }
            });

            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) { animationProgress = 1; isAnimating = false; document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`; }
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start; const p1 = window.animControlPoints.mid; const p2 = window.animControlPoints.end;
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
