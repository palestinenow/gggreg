<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Walkthrough</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        #blocker {
            position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        #instructions {
            color: white; text-align: center; cursor: pointer; padding: 20px; border: 2px solid white; border-radius: 10px;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference; z-index: 5;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    
    <div id="blocker">
        <div id="instructions">
            <h1 style="font-size: 36px;">CLICK TO PLAY</h1>
            <p style="font-size: 18px;">
                Move: W, A, S, D (or Z, Q, S, D)<br>
                Look: Mouse<br>
                Exit: ESC
            </p>
        </div>
    </div>

    <!-- Import Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let camera, scene, renderer, controls;
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        
        // Speed settings
        const speed = 10.0; 

        init();
        animate();

        function init() {
            // 1. Setup Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222); // Dark Gray background
            
            // Add some fog so distant objects fade nicely
            scene.fog = new THREE.Fog(0x222222, 0, 70);

            // 2. Setup Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // 3. Setup Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. Lights (Crucial for seeing colors)
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 5. Controls (FPS Style)
            controls = new PointerLockControls(camera, document.body);

            const blocker = document.getElementById('blocker');
            const instructions = document.getElementById('instructions');

            instructions.addEventListener('click', function () {
                controls.lock();
            });

            controls.addEventListener('lock', function () {
                instructions.style.display = 'none';
                blocker.style.display = 'none';
            });

            controls.addEventListener('unlock', function () {
                blocker.style.display = 'flex';
                instructions.style.display = 'block';
            });

            scene.add(controls.getObject());

            // 6. Keyboard Inputs (WASD + ZQSD)
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': case 'KeyZ': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': case 'KeyQ': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                }
            };

            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': case 'KeyZ': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': case 'KeyQ': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 7. Load Model
            const loader = new GLTFLoader();
            
            // IMPORTANT: Ensure this filename matches EXACTLY what is in your GitHub repo
            loader.load('./droid-workshop-kitchen.gltf', function (gltf) {
                const model = gltf.scene;
                scene.add(model);

                // Center the player near the model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                
                // Place camera slightly above and back from the center
                controls.getObject().position.set(center.x, center.y + 5, center.z + 15);
                
                console.log("Model Loaded Successfully");

            }, undefined, function (error) {
                console.error(error);
                alert("Error loading model. Check console (F12) for details.");
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const delta = 0.015; // Fixed time step for smoothness

                // Move Forward/Back
                if (moveForward) controls.moveForward(speed * delta);
                if (moveBackward) controls.moveForward(-speed * delta);

                // Move Left/Right
                if (moveLeft) controls.moveRight(-speed * delta);
                if (moveRight) controls.moveRight(speed * delta);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
