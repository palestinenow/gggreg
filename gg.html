<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinefdsrbit - Real Glass Effect</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #blocker { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; }
        #instructions { color: black; text-align: center; padding: 30px; border: 2px solid #333; border-radius: 10px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 10px 0; color: #333; } p { margin: 0; color: #666; }
        
        #status { position: absolute; bottom: 40px; left: 40px; color: #fff; font-size: 14px; z-index: 1000; opacity: 0.7; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(circle at center, transparent 51%, rgba(0,0,0,0.30) 80%, rgba(0,0,0,0.50) 100%);
        }
        
        /* SIMPLE VISIBLE BUTTONS */
        .simple-nav {
            position: fixed !important;
            bottom: 50% !important;
            left: 50% !important;
            transform: translate(-50%, 50%) !important;
            z-index: 10000 !important;
            display: flex !important;
            gap: 30px !important;
            opacity: 0 !important;
            transition: opacity 0.5s ease !important;
            pointer-events: none !important;
        }
        
        .simple-nav.visible {
            opacity: 1 !important;
            pointer-events: auto !important;
        }
        
        .simple-btn {
            padding: 20px 50px !important;
            font-size: 24px !important;
            font-weight: bold !important;
            text-transform: uppercase !important;
            letter-spacing: 4px !important;
            background: rgba(0, 0, 0, 0.8) !important;
            color: white !important;
            border: 3px solid white !important;
            border-radius: 60px !important;
            cursor: pointer !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            box-shadow: 0 0 30px rgba(255,255,255,0.3) !important;
            transition: all 0.3s ease !important;
        }
        
        .simple-btn:hover {
            background: white !important;
            color: black !important;
            transform: scale(1.1) !important;
            box-shadow: 0 0 50px rgba(255,255,255,0.5) !important;
        }
        
        #toggle-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #003300;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            border-radius: 5px;
            z-index: 10001;
        }
        
        #toggle-panel:hover {
            background: #0f0;
            color: black;
        }
        
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            z-index: 10002;
            max-height: 90vh;
            overflow-y: auto;
            min-width: 300px;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
            pointer-events: auto;
            display: none;
        }
        
        .control-group {
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
        }
        
        .station-btn {
            background: #003300;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px 12px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
            transition: all 0.2s;
            flex: 1;
        }
        
        .station-btn:hover, .station-btn.active {
            background: #0f0;
            color: black;
        }
        
        .pos-control {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .pos-control label {
            width: 20px;
            color: #0f0;
            font-weight: bold;
        }
        
        .pos-control input {
            flex: 1;
            margin: 0 10px;
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 5px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .pos-control button {
            background: #003300;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 3px;
        }
        
        .slider-control {
            margin-bottom: 15px;
        }
        
        .slider-control label {
            display: block;
            margin-bottom: 5px;
            color: #0f0;
        }
        
        .slider-control input {
            width: 100%;
            margin: 5px 0;
        }
        
        .action-btn {
            background: #003300;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 5px;
            flex: 1;
            font-weight: bold;
        }
        
        .action-btn:hover {
            background: #0f0;
            color: black;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1>CINEMATIC TOUR</h1>
            <p>Click to start.</p>
        </div>
    </div>

    <div id="status">Ready...</div>
    
    <div id="vignette"></div>
    
    <!-- SIMPLE VISIBLE BUTTONS -->
    <div class="simple-nav" id="simpleNav">
        <button class="simple-btn" onclick="window.hydroPrev()">← PREVIOUS</button>
        <button class="simple-btn" onclick="window.hydroNext()">NEXT →</button>
    </div>
    
    <button id="toggle-panel" onclick="toggleControlPanel()">🎮 CONTROLS</button>
    
    <div id="control-panel">
        <h3 style="color:#0f0; text-align:center;">🎛️ DEBUG CONTROLS</h3>
        
        <div class="control-group">
            <h4 style="color:#0f0;">📍 SELECT STATION CARD</h4>
            <div style="display:flex; gap:5px;">
                <button class="station-btn" onclick="selectStation(2)">D: 2</button>
                <button class="station-btn" onclick="selectStation(3)">E: 3</button>
                <button class="station-btn" onclick="selectStation(4)">F: 4</button>
                <button class="station-btn" onclick="selectStation(5)">G: 5</button>
            </div>
        </div>
        
        <div class="control-group">
            <h4 style="color:#0f0;">🎯 CARD POSITION</h4>
            <div class="pos-control">
                <label>X:</label>
                <input type="number" id="pos-x" step="0.01" value="0.10">
                <button onclick="moveCard('x', -0.1)">-</button>
                <button onclick="moveCard('x', 0.1)">+</button>
            </div>
            <div class="pos-control">
                <label>Y:</label>
                <input type="number" id="pos-y" step="0.01" value="1.20">
                <button onclick="moveCard('y', -0.1)">-</button>
                <button onclick="moveCard('y', 0.1)">+</button>
            </div>
            <div class="pos-control">
                <label>Z:</label>
                <input type="number" id="pos-z" step="0.01" value="4.00">
                <button onclick="moveCard('z', -0.1)">-</button>
                <button onclick="moveCard('z', 0.1)">+</button>
            </div>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <button class="action-btn" onclick="applyPosition()">✅ Apply</button>
                <button class="action-btn" onclick="copyPosition()">📋 Copy</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        window.toggleControlPanel = function() {
            const panel = document.getElementById('control-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        };
        
        let selectedStation = 2;
        window.selectStation = function(index) {
            selectedStation = index;
            if (cards[index]) {
                document.getElementById('pos-x').value = cards[index].position.x.toFixed(2);
                document.getElementById('pos-y').value = cards[index].position.y.toFixed(2);
                document.getElementById('pos-z').value = cards[index].position.z.toFixed(2);
            }
            document.querySelectorAll('.station-btn').forEach((btn, i) => {
                if (i === index - 2) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        };
        
        window.moveCard = function(axis, delta) {
            const input = document.getElementById(`pos-${axis}`);
            input.value = (parseFloat(input.value) + delta).toFixed(2);
            applyPosition();
        };
        
        window.applyPosition = function() {
            if (cards[selectedStation]) {
                const x = parseFloat(document.getElementById('pos-x').value);
                const y = parseFloat(document.getElementById('pos-y').value);
                const z = parseFloat(document.getElementById('pos-z').value);
                cards[selectedStation].position.set(x, y, z);
                cardPositions[selectedStation] = { x, y, z };
            }
        };
        
        window.copyPosition = function() {
            if (cards[selectedStation]) {
                const pos = cards[selectedStation].position;
                const text = `Station ${selectedStation}: (${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)})`;
                navigator.clipboard?.writeText(text);
                alert('Position copied!');
            }
        };

        window.hydroPrev = function() {
            prevStation();
        };
        
        window.hydroNext = function() {
            nextStation();
        };

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.domElement.style.position = 'fixed';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '1';
        document.body.appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.3;
        bloomPass.radius = 0.8;
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffeeff, 2); 
        spotLight.position.set(0, 10, 0); 
        spotLight.angle = Math.PI / 4; 
        spotLight.penumbra = 0.5; 
        spotLight.decay = 1; 
        spotLight.distance = 50; 
        spotLight.castShadow = true; 
        scene.add(spotLight); 
        spotLight.target.position.set(-0.006, 1.041, -0.008);
        scene.add(spotLight.target);
        
        const centerLight = new THREE.PointLight(0xff00ff, 0.5, 10); 
        centerLight.position.set(-0.006, 1.041, -0.008); 
        scene.add(centerLight);

        // --- STATIONS ---
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        const cardPositions = {
            2: { x: 0.10, y: 1.20, z: 4.00 },
            3: { x: 3.60, y: 1.25, z: 1.20 },
            4: { x: 2.20, y: 1.20, z: -3.20 },
            5: { x: -2.20, y: 1.25, z: -2.70 }
        };

        const cards = [];
        
        function createCard(stationName, stationIndex) {
            const canvas = document.createElement('canvas'); 
            canvas.width = 512; 
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            context.fillStyle = 'rgba(255, 255, 255, 0.1)'; 
            context.fillRect(0, 0, 512, 512);
            
            context.shadowColor = 'rgba(0, 0, 0, 1.0)';
            context.shadowBlur = 20;
            context.shadowOffsetX = 4;
            context.shadowOffsetY = 4;
            
            context.font = 'bold 70px Arial'; 
            context.fillStyle = '#ffffff'; 
            context.textAlign = 'center';
            context.fillText(stationName, 256, 200);
            
            context.font = 'bold 45px Arial'; 
            context.fillStyle = '#ffffff';
            context.fillText(`Station ${stationIndex}`, 256, 300);
            
            context.font = 'bold 32px Arial';
            context.fillStyle = '#ffffff';
            context.fillText('Viewpoint', 256, 370);
            
            context.shadowColor = 'transparent';
            
            const pageTexture = new THREE.CanvasTexture(canvas);
            
            const pageMaterial = new THREE.MeshStandardMaterial({ 
                map: pageTexture,
                transparent: true,
                opacity: 0.0,
                roughness: 0.05,
                metalness: 0.0,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.NormalBlending,
                emissive: new THREE.Color(0xffffff),
                emissiveIntensity: 0.5
            });
            
            const pageGeometry = new THREE.PlaneGeometry(1.8, 1.8);
            return new THREE.Mesh(pageGeometry, pageMaterial);
        }

        for (let i = 2; i < STATIONS.length; i++) {
            cards[i] = createCard(STATIONS[i].name, i);
            scene.add(cards[i]);
        }

        function positionCards() {
            for (let i = 2; i <= 5; i++) {
                if (cards[i] && cardPositions[i]) {
                    cards[i].position.set(cardPositions[i].x, cardPositions[i].y, cardPositions[i].z);
                    cards[i].lookAt(POINT_CENTER);
                }
            }
        }

        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 2.5;

        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => { 
                if (child.isMesh) { 
                    child.castShadow = true; 
                    child.receiveShadow = true; 
                    if (child.name.toLowerCase().includes('tree')) { 
                        child.material.emissive = new THREE.Color(0xaa00aa); 
                        child.material.emissiveIntensity = 0.5; 
                    } 
                } 
            });
            scene.add(model);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
            positionCards();
        }, undefined, function (error) { console.error(error); });

        document.getElementById('blocker').addEventListener('click', function() { 
            this.style.display = 'none'; 
            document.getElementById('status').innerText = "Tour Started - Go to Station C for navigation"; 
        });

        function updateNavVisibility() {
            const nav = document.getElementById('simpleNav');
            if (currentStationIndex === 1) {
                nav.classList.add('visible');
                document.getElementById('status').innerText = "Station C: Empty - Use buttons to navigate";
            } else {
                nav.classList.remove('visible');
            }
        }

        window.nextStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) {
                currentStationIndex = 1;
            } else if (currentStationIndex < STATIONS.length - 1) {
                currentStationIndex++;
            } else {
                currentStationIndex = 1;
            }
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
            updateNavVisibility();
            
            if (currentStationIndex >= 2) selectStation(currentStationIndex);
        };

        window.prevStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) {
                currentStationIndex = STATIONS.length - 1;
            } else if (currentStationIndex > 1) {
                currentStationIndex--;
            } else {
                currentStationIndex = STATIONS.length - 1;
            }
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
            updateNavVisibility();
            
            if (currentStationIndex >= 2) selectStation(currentStationIndex);
        };

        function startAnimation(targetPos) {
            isAnimating = true; 
            animationProgress = 0; 
            startPos.copy(camera.position); 
            endPos.copy(targetPos);
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2)); 
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) { 
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; 
        }

        function animate() {
            requestAnimationFrame(animate);

            for (let i = 2; i < cards.length; i++) {
                if (cards[i]) {
                    if (i === currentStationIndex) {
                        cards[i].lookAt(camera.position);
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.8, 0.1);
                    } else {
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.0, 0.1);
                    }
                }
            }

            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) { 
                    animationProgress = 1; 
                    isAnimating = false; 
                    document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`; 
                }
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start; 
                const p1 = window.animControlPoints.mid; 
                const p2 = window.animControlPoints.end;
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }

            composer.render();
        }
        animate();
        
        setTimeout(() => selectStation(2), 100);
        positionCards();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
