<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Orbit - Real Glass Effect</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
        #blocker { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer; }
        #instructions { color: black; text-align: center; padding: 30px; border: 2px solid #333; border-radius: 10px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 10px 0; color: #333; } p { margin: 0; color: #666; }
        #actions { position: absolute; bottom: 40px; right: 40px; z-index: 100; }
        button.main-btn { background: #333; color: #fff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 18px; border-radius: 50px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        button.main-btn:hover { background: #000; transform: translateY(-2px); }
        #status { position: absolute; bottom: 40px; left: 40px; color: #333; font-size: 14px; z-index: 100; opacity: 0.7; }
        
        /* Vignette overlay for extra depth */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.15) 80%, rgba(0,0,0,0.3) 100%);
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1>CINEMATIC TOUR</h1>
            <p>Click to start.<br>The card is now real frosted glass.</p>
        </div>
    </div>

    <div id="actions">
        <button class="main-btn" onclick="nextStation()">NEXT STATION ➡️</button>
    </div>

    <div id="status">Ready...</div>
    
    <!-- Vignette overlay for depth effect -->
    <div id="vignette"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- BLOOM EFFECT (THE SHINE) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.2;
        bloomPass.radius = 0.8;
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffeeff, 2); 
        spotLight.position.set(0, 10, 0); 
        spotLight.angle = Math.PI / 4; 
        spotLight.penumbra = 0.5; 
        spotLight.decay = 1; 
        spotLight.distance = 50; 
        spotLight.castShadow = true; 
        scene.add(spotLight); 
        spotLight.target.position.set(-0.006, 1.041, -0.008);
        scene.add(spotLight.target);
        
        const centerLight = new THREE.PointLight(0xff00ff, 0.4, 10); 
        centerLight.position.set(-0.006, 1.041, -0.008); 
        scene.add(centerLight);

        // --- GLOW PULSE SYSTEM (RANDOM TIMING) - 10% to 40% ---
        let glowStartTime = Date.now();
        let glowDurationUp = 7000 + Math.random() * 15000;
        let glowDurationDown = 7000 + Math.random() * 15000;
        let isGlowingUp = true;
        
        const MIN_STRENGTH = 0.1;
        const MAX_STRENGTH = 0.4;
        
        function getRandomDuration() {
            return 7000 + Math.random() * 15000;
        }
        
        function updateGlow() {
            const now = Date.now();
            const elapsed = now - glowStartTime;
            
            if (isGlowingUp) {
                const progress = Math.min(elapsed / glowDurationUp, 1);
                const strength = MIN_STRENGTH + (MAX_STRENGTH - MIN_STRENGTH) * progress;
                bloomPass.strength = strength;
                centerLight.intensity = strength * 2.0;
                
                if (progress >= 1) {
                    isGlowingUp = false;
                    glowStartTime = now;
                    glowDurationDown = getRandomDuration();
                }
            } else {
                const progress = Math.min(elapsed / glowDurationDown, 1);
                const strength = MAX_STRENGTH - (MAX_STRENGTH - MIN_STRENGTH) * progress;
                bloomPass.strength = strength;
                centerLight.intensity = strength * 2.0;
                
                if (progress >= 1) {
                    isGlowingUp = true;
                    glowStartTime = now;
                    glowDurationUp = getRandomDuration();
                }
            }
        }

        // --- STATIONS ---
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        // --- CREATE CARDS FOR EACH STATION (EXCEPT INTRO) ---
        const cards = [];
        
        function createCard(stationName, stationIndex) {
            const canvas = document.createElement('canvas'); 
            canvas.width = 512; 
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            context.fillStyle = 'rgba(255, 255, 255, 0.4)'; 
            context.fillRect(0, 0, 512, 512);
            
            context.strokeStyle = '#ffffff'; 
            context.lineWidth = 20; 
            context.strokeRect(20, 20, 472, 472);
            
            context.font = 'bold 50px Arial'; 
            context.fillStyle = '#333'; 
            context.textAlign = 'center';
            context.fillText(stationName, 256, 200);
            
            context.font = '30px Arial'; 
            context.fillStyle = '#555';
            context.fillText(`Station ${stationIndex}`, 256, 280);
            
            context.font = '20px Arial';
            context.fillStyle = '#777';
            context.fillText('Viewpoint', 256, 350);
            
            const pageTexture = new THREE.CanvasTexture(canvas);
            
            const pageMaterial = new THREE.MeshStandardMaterial({ 
                map: pageTexture,
                transparent: true,
                opacity: 0.0,
                roughness: 0.1,
                metalness: 0.1,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.NormalBlending
            });
            
            const pageGeometry = new THREE.PlaneGeometry(1.8, 1.8);
            const card = new THREE.Mesh(pageGeometry, pageMaterial);
            
            return card;
        }

        function positionCards() {
            cards[1].position.set(-3.61, 1.30, 1.17);
            cards[1].lookAt(POINT_CENTER);
            
            cards[2].position.set(1.2, 1.40, 4.5);
            cards[2].lookAt(POINT_CENTER);
            
            cards[3].position.set(4.0, 1.35, 1.0);
            cards[3].lookAt(POINT_CENTER);
            
            cards[4].position.set(2.5, 1.30, -3.2);
            cards[4].lookAt(POINT_CENTER);
            
            cards[5].position.set(-2.8, 1.25, -3.0);
            cards[5].lookAt(POINT_CENTER);
        }

        for (let i = 1; i < STATIONS.length; i++) {
            const card = createCard(STATIONS[i].name, i);
            cards[i] = card;
            scene.add(card);
        }

        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 2.5;

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => { 
                if (child.isMesh) { 
                    child.castShadow = true; 
                    child.receiveShadow = true; 
                    if (child.name.toLowerCase().includes('tree')) { 
                        child.material.emissive = new THREE.Color(0xaa00aa); 
                        child.material.emissiveIntensity = 0.5; 
                    } 
                } 
            });
            scene.add(model);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
            positionCards();
        }, undefined, function (error) { console.error(error); });

        // --- UI LOGIC ---
        document.getElementById('blocker').addEventListener('click', function() { 
            this.style.display = 'none'; 
            document.getElementById('status').innerText = "Tour Started"; 
        });

        window.nextStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) currentStationIndex = 1;
            else currentStationIndex = (currentStationIndex % (STATIONS.length - 1)) + 1;
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
        };

        function startAnimation(targetPos) {
            isAnimating = true; 
            animationProgress = 0; 
            startPos.copy(camera.position); 
            endPos.copy(targetPos);
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2)); 
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) { 
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; 
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            updateGlow();

            for (let i = 1; i < cards.length; i++) {
                if (cards[i]) {
                    if (i === currentStationIndex) {
                        cards[i].lookAt(camera.position);
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.5, 0.1);
                    } else {
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.0, 0.1);
                    }
                }
            }

            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) { 
                    animationProgress = 1; 
                    isAnimating = false; 
                    document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`; 
                }
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start; 
                const p1 = window.animControlPoints.mid; 
                const p2 = window.animControlPoints.end;
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
