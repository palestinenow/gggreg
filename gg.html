<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethera® - Cinematic Journey</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* === CSS RESET & BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* === CANVAS (3D Background) === */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* === WHITEWEB OVERLAY (Splash Screen) === */
        #whiteweb-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: auto;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), backdrop-filter 1.5s ease;
            opacity: 1;
            color: white;
        }

        #whiteweb-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #whiteweb-overlay .glass-panel {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        /* WhiteWeb Content */
        .whiteweb-content {
            position: relative;
            z-index: 11;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .whiteweb-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 2rem;
            letter-spacing: -0.02em;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .logo sup {
            font-size: 0.75rem;
            margin-left: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 400;
            transition: color 0.3s;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }

        .nav-links a:hover {
            color: white;
        }

        .nav-links a.active {
            color: white;
            font-weight: 500;
        }

        .nav-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 1px 5px rgba(0,0,0,0.2);
        }

        .nav-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        /* Hero Section */
        .whiteweb-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 24px;
            margin-top: -80px;
        }

        .hero-title {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 400;
            line-height: 0.95;
            letter-spacing: -0.03em;
            max-width: 1200px;
            margin: 0 auto 32px;
            color: white;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5);
            animation: fade-rise 0.8s ease-out forwards;
        }

        .hero-title .italic {
            font-style: italic;
            color: rgba(255, 255, 255, 0.7);
        }

        .hero-description {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: rgba(255, 255, 255, 0.85);
            max-width: 700px;
            margin: 0 auto 48px;
            line-height: 1.6;
            font-weight: 300;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            animation: fade-rise 0.8s ease-out 0.2s forwards;
            opacity: 0;
        }

        .begin-journey-btn {
            background: white;
            color: black;
            border: none;
            padding: 18px 56px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: fade-rise 0.8s ease-out 0.4s forwards;
            opacity: 0;
        }

        .begin-journey-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            background: #f0f0f0;
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
        }

        .mobile-menu {
            position: absolute;
            top: 90px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            z-index: 20;
            animation: fade-rise 0.3s ease-out;
        }

        .mobile-menu a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
        }

        /* === TRIPWEB INTERFACE (Hidden initially) === */
        #tripweb-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        #tripweb-interface.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* TripWeb Buttons */
        #actions { 
            position: fixed;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: none;
        }
        
        .hydro-btn {
            position: relative;
            padding: 18px 35px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(30, 41, 59, 0.2);
            backdrop-filter: blur(8px);
            color: white;
            cursor: pointer;
            overflow: visible;
            transition: transform 0.1s ease-out;
            pointer-events: auto;
            
            --proximity: 0;
            --opacity: calc(0.05 + (0.95 * var(--proximity)));
            --blur: calc(8px * (1 - var(--proximity)));
            --scale: calc(0.98 + (0.02 * var(--proximity)));
            --border: calc(0.05 + (0.45 * var(--proximity)));
            
            opacity: var(--opacity);
            filter: blur(var(--blur));
            transform: scale(var(--scale));
            border-color: rgba(255,255,255,var(--border));
        }
        
        .hydro-btn::before,
        .hydro-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.4);
            animation: ripple-bloom 1.2s cubic-bezier(0, 0.5, 0.5, 1) forwards;
            pointer-events: none;
            opacity: 0;
        }
        
        .hydro-btn::after {
            animation-delay: 0.1s;
            border-color: rgba(255,255,255,0.2);
        }
        
        .hydro-btn.bloom::before,
        .hydro-btn.bloom::after {
            opacity: 1;
            animation-name: ripple-bloom;
        }
        
        @keyframes ripple-bloom {
            0% { transform: scale(0.9); opacity: 0.8; border-width: 2px; }
            100% { transform: scale(1.4); opacity: 0; border-width: 0px; }
        }
        
        .hydro-btn .highlight {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        .hydro-btn:hover .highlight {
            opacity: 1;
        }
        
        .hydro-btn-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .hydro-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }
        
        .hydro-btn:hover svg {
            transform: translateX(4px);
        }

        #status { 
            position: fixed; 
            bottom: 40px; 
            left: 50%;
            transform: translateX(-50%);
            color: white; 
            font-size: 16px; 
            z-index: 100; 
            opacity: 0.7;
            font-family: 'Inter', sans-serif;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(circle at center, transparent 51%, rgba(0,0,0,0.30) 80%, rgba(0,0,0,0.50) 100%);
        }

        /* Glass Navigation Bar */
        .glass-nav {
            position: fixed;
            top: 68%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 680px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 50px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15), inset 0 -1px 0 rgba(255,255,255,0.04);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0;
            pointer-events: none;
            z-index: 150;
        }

        .glass-nav.visible {
            opacity: 1;
            pointer-events: auto;
            animation: fadeEnter 1.2s 0.2s forwards;
        }

        @keyframes fadeEnter { 
            to { opacity: 1; transform: translate(-50%, -50%); } 
        }

        .glass-nav.vanish {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.94) translateY(-20px);
            filter: blur(12px);
            pointer-events: none;
        }

        .dot { 
            width: 4px; height: 4px; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.25); 
            flex-shrink: 0; 
        }

        .input-wrap { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .glass-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: rgba(255,255,255,0.9);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            padding: 6px 0;
            text-align: center;
        }

        .glass-input::placeholder {
            color: rgba(255,255,255,0.35);
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        .conf-msg {
            font-family: 'Playfair Display', serif;
            color: rgba(255,255,255,0.95);
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.4;
            width: 100%;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .conf-msg.show { opacity: 1; transform: translateY(0); }
        .conf-msg em { font-style: normal; color: #a5b4fc; font-weight: 500; }

        .send-btn {
            width: 38px; height: 38px; 
            border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); 
            color: rgba(255,255,255,0.85);
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.3s ease; 
            flex-shrink: 0;
        }

        .send-btn:hover { 
            background: rgba(255,255,255,0.14); 
            border-color: rgba(255,255,255,0.3); 
            transform: scale(1.08); 
        }

        /* Animations */
        @keyframes fade-rise {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .whiteweb-nav {
                padding: 20px 24px;
            }
            
            .nav-links {
                display: none;
            }
            
            .nav-button.desktop-only {
                display: none;
            }
            
            .mobile-menu-btn {
                display: block;
            }
            
            .hero-title {
                font-size: clamp(2.5rem, 7vw, 4rem);
            }
            
            #actions { 
                padding: 0 20px; 
            }
            
            .hydro-btn { 
                padding: 15px 25px; 
                font-size: 14px; 
            }
        }

        /* Loading Indicator */
        .loading-indicator {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: white;
            font-size: 12px;
            opacity: 0.5;
            z-index: 100;
        }
    </style>
</head>
<body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- WhiteWeb Overlay (Splash Screen) -->
    <div id="whiteweb-overlay">
        <div class="whiteweb-content">
            <nav class="whiteweb-nav">
                <div class="logo">Aethera<sup>®</sup></div>
                
                <div class="nav-links">
                    <a href="#" class="active">Home</a>
                    <a href="#">Studio</a>
                    <a href="#">About</a>
                    <a href="#">Journal</a>
                    <a href="#">Reach Us</a>
                </div>
                
                <button class="nav-button desktop-only">Begin Journey</button>
                
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </nav>
            
            <div id="mobile-menu" class="mobile-menu" style="display: none;">
                <a href="#">Home</a>
                <a href="#">Studio</a>
                <a href="#">About</a>
                <a href="#">Journal</a>
                <a href="#">Reach Us</a>
                <button class="nav-button" style="margin-top: 16px;" onclick="beginJourney()">Begin Journey</button>
            </div>
            
            <main class="whiteweb-hero">
                <h1 class="hero-title">
                    Beyond <span class="italic">silence,</span> we build <br/>
                    <span class="italic">the eternal.</span>
                </h1>
                
                <p class="hero-description">
                    Building platforms for brilliant minds, fearless makers, and thoughtful souls. 
                    Through the noise, we craft digital havens for deep work and pure flows.
                </p>
                
                <button class="begin-journey-btn" onclick="beginJourney()">
                    Begin Journey
                </button>
            </main>
        </div>
    </div>

    <!-- TripWeb Interface (Hidden initially) -->
    <div id="tripweb-interface">
        <div id="actions">
            <button class="hydro-btn" id="prevBtn">
                <span class="hydro-btn-content">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
                    </svg>
                    <span>Previous</span>
                </span>
                <span class="highlight"></span>
            </button>
            <button class="hydro-btn" id="nextBtn">
                <span class="hydro-btn-content">
                    <span>Next</span>
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />
                    </svg>
                </span>
                <span class="highlight"></span>
            </button>
        </div>

        <div id="status">Beginning journey...</div>
        
        <div id="vignette"></div>
        
        <nav class="glass-nav" id="glassNav">
            <div class="dot"></div>
            <div class="input-wrap" id="inputWrap"></div>
            <button class="send-btn" id="sendBtn" aria-label="Submit">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
            <div class="dot"></div>
        </nav>
    </div>

    <!-- Three.js Import and Script -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // === STATE ===
        let isJourneyStarted = false;
        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 3.5;
        
        // === STATION DATA ===
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        // === THREE.JS SETUP ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.copy(STATIONS[0].pos);
        camera.lookAt(POINT_CENTER);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // === POST-PROCESSING ===
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.3;
        bloomPass.radius = 0.8;
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // === LIGHTS ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffeeff, 2);
        spotLight.position.set(0, 10, 0);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.decay = 1;
        spotLight.distance = 50;
        spotLight.castShadow = true;
        scene.add(spotLight);
        spotLight.target.position.copy(POINT_CENTER);
        scene.add(spotLight.target);
        
        const centerLight = new THREE.PointLight(0xff44ff, 0.5, 10);
        centerLight.position.copy(POINT_CENTER);
        scene.add(centerLight);
        
        // Add some atmospheric lights
        const backLight1 = new THREE.PointLight(0x4466ff, 0.3, 20);
        backLight1.position.set(-3, 3, -3);
        scene.add(backLight1);
        
        const backLight2 = new THREE.PointLight(0xff66aa, 0.2, 20);
        backLight2.position.set(3, 2, -4);
        scene.add(backLight2);

        // === CARDS ===
        const cards = [];
        const cardPositions = {
            2: { x: 0.10, y: 1.20, z: 4.00 },
            3: { x: 3.60, y: 1.25, z: 1.20 },
            4: { x: 2.20, y: 1.20, z: -3.20 },
            5: { x: -2.20, y: 1.25, z: -2.70 }
        };
        
        function createCard(stationName, stationIndex) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            // Create glass card effect
            const gradient = context.createLinearGradient(0, 0, 512, 512);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0.05)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 512, 512);
            
            // Add border
            context.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            context.lineWidth = 4;
            context.strokeRect(2, 2, 508, 508);
            
            context.shadowColor = 'rgba(0, 0, 0, 0.5)';
            context.shadowBlur = 20;
            context.shadowOffsetX = 4;
            context.shadowOffsetY = 4;
            
            context.font = 'bold 70px "Instrument Serif", serif';
            context.fillStyle = '#ffffff';
            context.textAlign = 'center';
            context.fillText(stationName, 256, 200);
            
            context.font = 'bold 45px "Inter", sans-serif';
            context.fillStyle = '#ffffff';
            context.fillText(`Station ${stationIndex}`, 256, 300);
            
            context.font = '300 32px "Inter", sans-serif';
            context.fillStyle = '#ffffff';
            context.fillText('Viewpoint', 256, 370);
            
            context.shadowColor = 'transparent';
            
            const pageTexture = new THREE.CanvasTexture(canvas);
            const pageMaterial = new THREE.MeshStandardMaterial({
                map: pageTexture,
                transparent: true,
                opacity: 0.0,
                roughness: 0.1,
                metalness: 0.0,
                side: THREE.DoubleSide,
                emissive: new THREE.Color(0xffffff),
                emissiveIntensity: 0.3
            });
            
            const pageGeometry = new THREE.PlaneGeometry(1.8, 1.8);
            return new THREE.Mesh(pageGeometry, pageMaterial);
        }

        // Create cards for stations 2-5
        for (let i = 2; i < STATIONS.length; i++) {
            const card = createCard(STATIONS[i].name, i);
            cards[i] = card;
            scene.add(card);
        }

        function positionCards() {
            for (let i = 2; i <= 5; i++) {
                if (cards[i] && cardPositions[i]) {
                    cards[i].position.set(cardPositions[i].x, cardPositions[i].y, cardPositions[i].z);
                    cards[i].lookAt(POINT_CENTER);
                }
            }
        }

        // === LOAD 3D MODEL ===
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', 
            function (gltf) {
                const model = gltf.scene;
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.name.toLowerCase().includes('tree')) {
                            child.material.emissive = new THREE.Color(0xaa44aa);
                            child.material.emissiveIntensity = 0.4;
                        }
                    }
                });
                scene.add(model);
                positionCards();
            },
            undefined,
            function (error) {
                console.error('Model loading error:', error);
                // Create a fallback scene with basic geometry
                createFallbackScene();
                positionCards();
            }
        );

        function createFallbackScene() {
            // Create a simple but beautiful fallback scene
            const geometry = new THREE.CylinderGeometry(0.5, 1, 3, 8);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x8866aa, 
                emissive: new THREE.Color(0x442266),
                emissiveIntensity: 0.5,
                roughness: 0.3,
                metalness: 0.1
            });
            const tree = new THREE.Mesh(geometry, material);
            tree.position.copy(POINT_CENTER);
            tree.position.y = 1.5;
            scene.add(tree);
            
            // Add ground plane
            const groundGeometry = new THREE.CircleGeometry(10, 32);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a2e, 
                roughness: 0.8,
                side: THREE.DoubleSide
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0;
            scene.add(ground);
            
            // Add floating particles
            const particleGeometry = new THREE.BufferGeometry();
            const particleCount = 500;
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 20;
                positions[i+1] = Math.random() * 8;
                positions[i+2] = (Math.random() - 0.5) * 20;
            }
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleMaterial = new THREE.PointsMaterial({ 
                color: 0xaa88ff, 
                size: 0.02,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            const particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
        }

        // === GLASS NAVIGATION (TripWeb) ===
        const nav = document.getElementById('glassNav');
        const inputWrap = document.getElementById('inputWrap');
        const sendBtn = document.getElementById('sendBtn');
        let navStep = 1;
        let wishText = '';
        let navVisible = false;

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString + 'T00:00:00').toLocaleDateString('en-US', options);
        }

        function initNav() {
            inputWrap.innerHTML = `<input type="text" class="glass-input" id="mainInput" placeholder="You are in front of the tree of life. Make a wish..." autocomplete="off">`;
            const inp = document.getElementById('mainInput');
            if (inp) {
                inp.focus();
                inp.addEventListener('keydown', (e) => e.key === 'Enter' && handleSend());
            }
        }

        function handleSend() {
            const inp = document.querySelector('.glass-input');
            const val = inp?.value.trim();
            
            if (navStep === 1) {
                if (!val) return;
                wishText = val;
                navStep = 2;
                
                inputWrap.style.opacity = '0';
                setTimeout(() => {
                    inputWrap.innerHTML = `<input type="date" class="glass-input" id="dateInput" required>`;
                    inputWrap.style.opacity = '1';
                    const dateInp = document.getElementById('dateInput');
                    if (dateInp) {
                        dateInp.focus();
                        dateInp.addEventListener('keydown', (e) => e.key === 'Enter' && handleSend());
                    }
                }, 250);

            } else if (navStep === 2) {
                if (!val) return;
                navStep = 3;
                
                const displayDate = formatDate(val);
                
                sendBtn.style.opacity = '0';
                sendBtn.style.pointerEvents = 'none';
                inputWrap.style.opacity = '0';
                
                setTimeout(() => {
                    inputWrap.innerHTML = `
                        <p class="conf-msg" id="confMsg">
                            Come back on <em>${displayDate}</em>.<br>
                            Your wish will become true.
                        </p>
                    `;
                    inputWrap.style.opacity = '1';
                    requestAnimationFrame(() => document.getElementById('confMsg')?.classList.add('show'));
                    
                    setTimeout(() => {
                        nav.classList.add('vanish');
                        nav.classList.remove('visible');
                        navVisible = false;
                        navStep = 1;
                        sendBtn.style.opacity = '1';
                        sendBtn.style.pointerEvents = 'auto';
                    }, 3500);
                    
                }, 300);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        initNav();

        function showNavBar() {
            if (!navVisible) {
                nav.classList.remove('vanish');
                nav.classList.add('visible');
                navVisible = true;
                navStep = 1;
                sendBtn.style.opacity = '1';
                sendBtn.style.pointerEvents = 'auto';
                initNav();
            }
        }

        function hideNavBar() {
            if (navVisible) {
                nav.classList.remove('visible');
                nav.classList.add('vanish');
                navVisible = false;
            }
        }

        // === HYDRO BUTTON EFFECTS ===
        const hydroButtons = document.querySelectorAll('.hydro-btn');
        
        document.addEventListener('mousemove', (e) => {
            if (!isJourneyStarted) return;
            
            const screenWidth = window.innerWidth;
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            [prevBtn, nextBtn].forEach(btn => {
                if (!btn) return;
                const rect = btn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const distance = Math.sqrt(Math.pow(mouseX - centerX, 2) + Math.pow(mouseY - centerY, 2));
                const proximity = Math.max(0, 1 - Math.min(distance / 800, 1));
                btn.style.setProperty('--proximity', proximity);
            });
        });
        
        function triggerAutoBloom() {
            hydroButtons.forEach(btn => {
                btn.classList.add('bloom');
                setTimeout(() => btn.classList.remove('bloom'), 1200);
            });
        }
        setInterval(triggerAutoBloom, 2000);

        // === STATION NAVIGATION ===
        function startAnimation(targetPos) {
            isAnimating = true;
            animationProgress = 0;
            startPos.copy(camera.position);
            endPos.copy(targetPos);
            
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2));
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function nextStation() {
            if (isAnimating || !isJourneyStarted) return;
            
            if (currentStationIndex === 0) {
                currentStationIndex = 1;
            } else if (currentStationIndex < STATIONS.length - 1) {
                currentStationIndex++;
            } else {
                currentStationIndex = 1;
            }
            
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
            
            if (currentStationIndex !== 1) hideNavBar();
        }

        function prevStation() {
            if (isAnimating || !isJourneyStarted) return;
            
            if (currentStationIndex === 0) {
                currentStationIndex = STATIONS.length - 1;
            } else if (currentStationIndex > 1) {
                currentStationIndex--;
            } else {
                currentStationIndex = STATIONS.length - 1;
            }
            
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
            
            if (currentStationIndex !== 1) hideNavBar();
        }

        // Attach navigation handlers
        document.getElementById('prevBtn').onclick = prevStation;
        document.getElementById('nextBtn').onclick = nextStation;

        // === BEGIN JOURNEY (Transition from WhiteWeb to TripWeb) ===
        window.beginJourney = function() {
            if (isJourneyStarted) return;
            isJourneyStarted = true;
            
            // Fade out WhiteWeb overlay
            document.getElementById('whiteweb-overlay').classList.add('fade-out');
            document.getElementById('mobile-menu').style.display = 'none';
            
            // Show TripWeb interface
            setTimeout(() => {
                document.getElementById('tripweb-interface').classList.add('visible');
            }, 500);
            
            // Animate camera to first station
            currentStationIndex = 1;
            startAnimation(STATIONS[1].pos);
            document.getElementById('status').innerText = 'Journey beginning...';
            
            // Show nav bar after arrival
            setTimeout(() => {
                if (currentStationIndex === 1 && !isAnimating) {
                    showNavBar();
                }
            }, ANIMATION_DURATION * 1000 + 500);
        };

        // === MOBILE MENU ===
        window.toggleMobileMenu = function() {
            const menu = document.getElementById('mobile-menu');
            menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
        };

        // === GLOW PULSE ===
        let glowTime = 0;
        
        // === ANIMATION LOOP ===
        function animate() {
            requestAnimationFrame(animate);
            
            // Pulsing glow effect
            glowTime += 0.01;
            const glowPulse = 0.25 + Math.sin(glowTime) * 0.1;
            bloomPass.strength = glowPulse;
            centerLight.intensity = 0.3 + Math.sin(glowTime * 1.5) * 0.2;
            
            // Handle card visibility
            for (let i = 2; i < cards.length; i++) {
                if (cards[i]) {
                    if (i === currentStationIndex && isJourneyStarted) {
                        cards[i].lookAt(camera.position);
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.8, 0.1);
                    } else {
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.0, 0.1);
                    }
                }
            }
            
            // Camera animation
            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                
                if (animationProgress >= 1) {
                    animationProgress = 1;
                    isAnimating = false;
                    document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`;
                    
                    if (currentStationIndex === 1 && isJourneyStarted) {
                        showNavBar();
                    }
                }
                
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start;
                const p1 = window.animControlPoints.mid;
                const p2 = window.animControlPoints.end;
                
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }
            
            composer.render();
        }
        
        animate();

        // === WINDOW RESIZE ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start with intro view
        console.log('✨ Aethera Cinematic Journey - Ready');
    </script>
</body>
</html>
