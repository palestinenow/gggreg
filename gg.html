<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethera® - Cinematic Journey</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* === CSS RESET & BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* === CANVAS (3D Background) === */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* === WHITEWEB OVERLAY (Splash Screen) === */
        #whiteweb-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: auto;
            transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        #whiteweb-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Enhanced Glass Panel for WhiteWeb */
        .glass-panel-enhanced {
            background: rgba(15, 15, 25, 0.35);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
        }

        /* WhiteWeb Content */
        .whiteweb-content {
            position: relative;
            z-index: 11;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .whiteweb-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 56px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .nav-glass {
            background: rgba(10, 10, 20, 0.3);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 60px;
            padding: 12px 28px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            color: white;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            font-weight: 400;
        }

        .logo sup {
            font-size: 0.8rem;
            margin-left: 3px;
            opacity: 0.9;
        }

        .nav-links {
            display: flex;
            gap: 48px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            transition: all 0.3s;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            opacity: 0.9;
            letter-spacing: 0.3px;
        }

        .nav-links a:hover {
            opacity: 1;
            transform: translateY(-1px);
        }

        .nav-links a.active {
            opacity: 1;
            font-weight: 500;
            position: relative;
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            right: 0;
            height: 2px;
            background: white;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .nav-button {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .nav-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        /* Hero Section */
        .whiteweb-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 32px;
            margin-top: -80px;
        }

        .hero-title {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3.5rem, 9vw, 8rem);
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.03em;
            max-width: 1300px;
            margin: 0 auto 40px;
            color: white;
            text-shadow: 0 8px 40px rgba(0,0,0,0.6);
            animation: fade-rise 0.8s ease-out forwards;
        }

        .hero-title .italic {
            font-style: italic;
            opacity: 0.95;
        }

        .hero-description {
            font-size: clamp(1.1rem, 2.2vw, 1.3rem);
            color: white;
            max-width: 750px;
            margin: 0 auto 56px;
            line-height: 1.7;
            font-weight: 300;
            text-shadow: 0 4px 30px rgba(0,0,0,0.6);
            animation: fade-rise 0.8s ease-out 0.2s forwards;
            opacity: 0;
            letter-spacing: 0.2px;
        }

        .hero-description-glass {
            background: rgba(10, 10, 20, 0.25);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 28px 40px;
            box-shadow: 
                0 8px 40px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .begin-journey-btn {
            background: white;
            color: black;
            border: none;
            padding: 20px 64px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 40px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.1);
            animation: fade-rise 0.8s ease-out 0.4s forwards;
            opacity: 0;
            letter-spacing: 0.5px;
        }

        .begin-journey-btn:hover {
            transform: scale(1.08);
            box-shadow: 
                0 12px 50px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.2);
            background: #f8f8f8;
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: rgba(10, 10, 20, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            padding: 12px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-menu {
            position: absolute;
            top: 100px;
            left: 20px;
            right: 20px;
            background: rgba(15, 15, 25, 0.5);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
            z-index: 20;
            animation: fade-rise 0.3s ease-out;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .mobile-menu a {
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        /* === TRIPWEB INTERFACE === */
        #tripweb-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.8s ease;
        }

        #tripweb-interface.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* TripWeb Buttons - Enhanced Glass */
        #actions { 
            position: fixed;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 48px;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: none;
        }
        
        .hydro-btn {
            position: relative;
            padding: 20px 40px;
            font-weight: 500;
            font-size: 17px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(20, 25, 40, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: white;
            cursor: pointer;
            overflow: visible;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.15);
            
            --proximity: 0;
            --opacity: calc(0.3 + (0.7 * var(--proximity)));
            --blur: calc(20px * (1 - var(--proximity) * 0.5));
            --scale: calc(0.98 + (0.02 * var(--proximity)));
            --border: calc(0.15 + (0.35 * var(--proximity)));
            
            opacity: var(--opacity);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            transform: scale(var(--scale));
            border-color: rgba(255,255,255,var(--border));
            letter-spacing: 0.5px;
        }
        
        .hydro-btn::before,
        .hydro-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.5);
            animation: ripple-bloom 1.2s cubic-bezier(0, 0.5, 0.5, 1) forwards;
            pointer-events: none;
            opacity: 0;
        }
        
        .hydro-btn::after {
            animation-delay: 0.1s;
            border-color: rgba(255,255,255,0.3);
        }
        
        .hydro-btn.bloom::before,
        .hydro-btn.bloom::after {
            opacity: 1;
            animation-name: ripple-bloom;
        }
        
        @keyframes ripple-bloom {
            0% { transform: scale(0.9); opacity: 0.8; border-width: 2px; }
            100% { transform: scale(1.5); opacity: 0; border-width: 0px; }
        }
        
        .hydro-btn .highlight {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        .hydro-btn:hover {
            background: rgba(30, 35, 50, 0.5);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        
        .hydro-btn:hover .highlight {
            opacity: 1;
        }
        
        .hydro-btn-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 14px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }
        
        .hydro-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }
        
        .hydro-btn:hover svg {
            transform: translateX(5px);
        }

        /* Remove status text - hidden */
        #status { 
            display: none;
        }
        
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.25) 75%, rgba(0,0,0,0.45) 100%);
        }

        /* Enhanced Glass Navigation Bar */
        .glass-nav {
            position: fixed;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 700px;
            height: 70px;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 28px;
            background: rgba(15, 20, 30, 0.35);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 60px;
            box-shadow: 
                0 15px 50px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.2),
                inset 0 -1px 0 rgba(255,255,255,0.05);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0;
            pointer-events: none;
            z-index: 150;
        }

        .glass-nav.visible {
            opacity: 1;
            pointer-events: auto;
            animation: fadeEnter 1.2s 0.2s forwards;
        }

        @keyframes fadeEnter { 
            to { opacity: 1; transform: translate(-50%, -50%); } 
        }

        .glass-nav.vanish {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.94) translateY(-20px);
            filter: blur(15px);
            pointer-events: none;
        }

        .dot { 
            width: 5px; 
            height: 5px; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.4); 
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
            transition: all 0.4s ease; 
        }
        
        .glass-nav:hover .dot { 
            background: rgba(255,255,255,0.8); 
            box-shadow: 0 0 15px rgba(255,255,255,0.5); 
        }

        .input-wrap { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .glass-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 0.5px;
            padding: 8px 0;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .glass-input::placeholder {
            color: rgba(255,255,255,0.5);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .conf-msg {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1rem;
            text-align: center;
            line-height: 1.5;
            width: 100%;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            text-shadow: 0 2px 15px rgba(0,0,0,0.4);
        }

        .conf-msg.show { 
            opacity: 1; 
            transform: translateY(0); 
        }
        
        .conf-msg em { 
            font-style: normal; 
            color: #c4b5fd; 
            font-weight: 500;
            text-shadow: 0 0 20px rgba(196, 181, 253, 0.5);
        }

        .send-btn {
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); 
            color: white;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.3s ease; 
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .send-btn:hover { 
            background: rgba(255,255,255,0.2); 
            border-color: rgba(255,255,255,0.4); 
            transform: scale(1.1); 
            box-shadow: 0 6px 25px rgba(196, 181, 253, 0.2);
        }

        /* Animations */
        @keyframes fade-rise {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .whiteweb-nav {
                padding: 20px 24px;
            }
            
            .nav-links {
                display: none;
            }
            
            .nav-button.desktop-only {
                display: none;
            }
            
            .hero-title {
                font-size: clamp(2.8rem, 8vw, 4.5rem);
            }
            
            .hero-description-glass {
                padding: 20px 24px;
            }
            
            #actions { 
                padding: 0 20px; 
            }
            
            .hydro-btn { 
                padding: 16px 28px; 
                font-size: 15px; 
            }
            
            .glass-nav {
                height: 60px;
                padding: 0 20px;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- WhiteWeb Overlay -->
    <div id="whiteweb-overlay">
        <div class="whiteweb-content">
            <nav class="whiteweb-nav">
                <div class="logo">Aethera<sup>®</sup></div>
                
                <div class="nav-links nav-glass">
                    <a href="#" class="active">Home</a>
                    <a href="#">Studio</a>
                    <a href="#">About</a>
                    <a href="#">Journal</a>
                    <a href="#">Reach Us</a>
                </div>
                
                <button class="nav-button desktop-only" onclick="beginJourney()">Begin Journey</button>
                
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </nav>
            
            <div id="mobile-menu" class="mobile-menu" style="display: none;">
                <a href="#">Home</a>
                <a href="#">Studio</a>
                <a href="#">About</a>
                <a href="#">Journal</a>
                <a href="#">Reach Us</a>
                <button class="nav-button" style="margin-top: 20px; width: 100%;" onclick="beginJourney()">Begin Journey</button>
            </div>
            
            <main class="whiteweb-hero">
                <h1 class="hero-title">
                    Beyond <span class="italic">silence,</span> we build <br/>
                    <span class="italic">the eternal.</span>
                </h1>
                
                <div class="hero-description-glass">
                    <p class="hero-description" style="margin: 0; animation: none; opacity: 1;">
                        Building platforms for brilliant minds, fearless makers, and thoughtful souls. 
                        Through the noise, we craft digital havens for deep work and pure flows.
                    </p>
                </div>
                
                <button class="begin-journey-btn" onclick="beginJourney()">
                    Begin Journey
                </button>
            </main>
        </div>
    </div>

    <!-- TripWeb Interface -->
    <div id="tripweb-interface">
        <div id="actions">
            <button class="hydro-btn" id="prevBtn">
                <span class="hydro-btn-content">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                    <span>Previous</span>
                </span>
                <span class="highlight"></span>
            </button>
            <button class="hydro-btn" id="nextBtn">
                <span class="hydro-btn-content">
                    <span>Next</span>
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7" />
                    </svg>
                </span>
                <span class="highlight"></span>
            </button>
        </div>

        <div id="status"></div>
        
        <div id="vignette"></div>
        
        <nav class="glass-nav" id="glassNav">
            <div class="dot"></div>
            <div class="input-wrap" id="inputWrap"></div>
            <button class="send-btn" id="sendBtn" aria-label="Submit">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
            <div class="dot"></div>
        </nav>
    </div>

    <!-- Three.js Script -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // === STATE ===
        let isJourneyStarted = false;
        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 3.8;
        
        // === STATION DATA ===
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "First View", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "Second View", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "Third View", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "Fourth View", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "Fifth View", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        // === THREE.JS SETUP ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080812);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.copy(STATIONS[0].pos);
        camera.lookAt(POINT_CENTER);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // === POST-PROCESSING ===
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.35;
        bloomPass.radius = 0.9;
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // === ENHANCED LIGHTING ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffeeff, 2.5);
        spotLight.position.set(0, 12, 2);
        spotLight.angle = Math.PI / 3;
        spotLight.penumbra = 0.6;
        spotLight.decay = 0.8;
        spotLight.distance = 60;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);
        spotLight.target.position.copy(POINT_CENTER);
        scene.add(spotLight.target);
        
        const centerLight = new THREE.PointLight(0xff66cc, 0.8, 12);
        centerLight.position.copy(POINT_CENTER);
        scene.add(centerLight);
        
        const fillLight1 = new THREE.PointLight(0x6688ff, 0.4, 25);
        fillLight1.position.set(-4, 3, -3);
        scene.add(fillLight1);
        
        const fillLight2 = new THREE.PointLight(0xff9966, 0.3, 25);
        fillLight2.position.set(4, 2.5, -4);
        scene.add(fillLight2);
        
        const backLight = new THREE.PointLight(0xaa88ff, 0.3, 30);
        backLight.position.set(0, 4, -8);
        scene.add(backLight);

        // === CARDS ===
        const cards = [];
        const cardPositions = {
            2: { x: 0.10, y: 1.20, z: 4.00 },
            3: { x: 3.60, y: 1.25, z: 1.20 },
            4: { x: 2.20, y: 1.20, z: -3.20 },
            5: { x: -2.20, y: 1.25, z: -2.70 }
        };
        
        function createCard(stationName, stationIndex) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            // Enhanced glass card design
            const gradient = context.createLinearGradient(0, 0, 512, 512);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0.05)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 512, 512);
            
            context.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            context.lineWidth = 5;
            context.strokeRect(2, 2, 508, 508);
            
            context.shadowColor = 'rgba(0, 0, 0, 0.6)';
            context.shadowBlur = 25;
            context.shadowOffsetX = 5;
            context.shadowOffsetY = 5;
            
            context.font = 'bold 75px "Instrument Serif", serif';
            context.fillStyle = '#ffffff';
            context.textAlign = 'center';
            context.fillText(stationName, 256, 200);
            
            context.font = 'bold 50px "Inter", sans-serif';
            context.fillStyle = '#ffffff';
            context.fillText(`View ${stationIndex-1}`, 256, 310);
            
            context.font = '300 35px "Inter", sans-serif';
            context.fillStyle = '#ffffff';
            context.fillText('Viewpoint', 256, 380);
            
            context.shadowColor = 'transparent';
            
            const pageTexture = new THREE.CanvasTexture(canvas);
            const pageMaterial = new THREE.MeshStandardMaterial({
                map: pageTexture,
                transparent: true,
                opacity: 0.0,
                roughness: 0.08,
                metalness: 0.0,
                side: THREE.DoubleSide,
                emissive: new THREE.Color(0xffffff),
                emissiveIntensity: 0.4
            });
            
            const pageGeometry = new THREE.PlaneGeometry(2.0, 2.0);
            return new THREE.Mesh(pageGeometry, pageMaterial);
        }

        // Create cards
        for (let i = 2; i < STATIONS.length; i++) {
            const card = createCard(STATIONS[i].name, i);
            cards[i] = card;
            scene.add(card);
        }

        function positionCards() {
            for (let i = 2; i <= 5; i++) {
                if (cards[i] && cardPositions[i]) {
                    cards[i].position.set(cardPositions[i].x, cardPositions[i].y, cardPositions[i].z);
                    cards[i].lookAt(POINT_CENTER);
                }
            }
        }

        // === LOAD 3D MODEL ===
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', 
            function (gltf) {
                const model = gltf.scene;
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.name.toLowerCase().includes('tree')) {
                            child.material.emissive = new THREE.Color(0xcc66cc);
                            child.material.emissiveIntensity = 0.5;
                        }
                    }
                });
                scene.add(model);
                positionCards();
            },
            undefined,
            function (error) {
                console.error('Model loading error:', error);
                createFallbackScene();
                positionCards();
            }
        );

        function createFallbackScene() {
            // Elegant fallback scene
            const treeGroup = new THREE.Group();
            
            const trunkGeo = new THREE.CylinderGeometry(0.6, 0.9, 3.5, 8);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x665588, emissive: new THREE.Color(0x332244), emissiveIntensity: 0.4 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1.75;
            treeGroup.add(trunk);
            
            const foliageGeo = new THREE.SphereGeometry(1.8, 7);
            const foliageMat = new THREE.MeshStandardMaterial({ color: 0x9966aa, emissive: new THREE.Color(0x552266), emissiveIntensity: 0.5 });
            const foliage = new THREE.Mesh(foliageGeo, foliageMat);
            foliage.position.y = 3.8;
            treeGroup.add(foliage);
            
            treeGroup.position.copy(POINT_CENTER);
            scene.add(treeGroup);
            
            // Ground
            const groundGeo = new THREE.CircleGeometry(12, 32);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7, side: THREE.DoubleSide });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0;
            scene.add(ground);
            
            // Particles
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 800;
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 22;
                positions[i+1] = Math.random() * 9;
                positions[i+2] = (Math.random() - 0.5) * 22;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0xbb99ff, size: 0.025, transparent: true, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
        }

        // === GLASS NAVIGATION ===
        const nav = document.getElementById('glassNav');
        const inputWrap = document.getElementById('inputWrap');
        const sendBtn = document.getElementById('sendBtn');
        let navStep = 1;
        let navVisible = false;

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString + 'T00:00:00').toLocaleDateString('en-US', options);
        }

        function initNav() {
            inputWrap.innerHTML = `<input type="text" class="glass-input" id="mainInput" placeholder="Make a wish beneath the tree of life..." autocomplete="off">`;
            const inp = document.getElementById('mainInput');
            if (inp) {
                inp.focus();
                inp.addEventListener('keydown', (e) => e.key === 'Enter' && handleSend());
            }
        }

        function handleSend() {
            const inp = document.querySelector('.glass-input');
            const val = inp?.value.trim();
            
            if (navStep === 1) {
                if (!val) return;
                navStep = 2;
                
                inputWrap.style.opacity = '0';
                setTimeout(() => {
                    inputWrap.innerHTML = `<input type="date" class="glass-input" id="dateInput" required>`;
                    inputWrap.style.opacity = '1';
                    const dateInp = document.getElementById('dateInput');
                    if (dateInp) {
                        dateInp.focus();
                        dateInp.addEventListener('keydown', (e) => e.key === 'Enter' && handleSend());
                    }
                }, 250);

            } else if (navStep === 2) {
                if (!val) return;
                navStep = 3;
                
                const displayDate = formatDate(val);
                
                sendBtn.style.opacity = '0';
                sendBtn.style.pointerEvents = 'none';
                inputWrap.style.opacity = '0';
                
                setTimeout(() => {
                    inputWrap.innerHTML = `
                        <p class="conf-msg" id="confMsg">
                            Return on <em>${displayDate}</em><br>
                            Your wish shall be fulfilled
                        </p>
                    `;
                    inputWrap.style.opacity = '1';
                    requestAnimationFrame(() => document.getElementById('confMsg')?.classList.add('show'));
                    
                    setTimeout(() => {
                        nav.classList.add('vanish');
                        nav.classList.remove('visible');
                        navVisible = false;
                        navStep = 1;
                        sendBtn.style.opacity = '1';
                        sendBtn.style.pointerEvents = 'auto';
                    }, 4000);
                    
                }, 300);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        initNav();

        function showNavBar() {
            if (!navVisible) {
                nav.classList.remove('vanish');
                nav.classList.add('visible');
                navVisible = true;
                navStep = 1;
                sendBtn.style.opacity = '1';
                sendBtn.style.pointerEvents = 'auto';
                initNav();
            }
        }

        function hideNavBar() {
            if (navVisible) {
                nav.classList.remove('visible');
                nav.classList.add('vanish');
                navVisible = false;
            }
        }

        // === HYDRO BUTTON EFFECTS ===
        const hydroButtons = document.querySelectorAll('.hydro-btn');
        
        document.addEventListener('mousemove', (e) => {
            if (!isJourneyStarted) return;
            
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            [prevBtn, nextBtn].forEach(btn => {
                if (!btn) return;
                const rect = btn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const distance = Math.sqrt(Math.pow(e.clientX - centerX, 2) + Math.pow(e.clientY - centerY, 2));
                const proximity = Math.max(0, 1 - Math.min(distance / 700, 1));
                btn.style.setProperty('--proximity', proximity);
            });
        });
        
        function triggerAutoBloom() {
            hydroButtons.forEach(btn => {
                btn.classList.add('bloom');
                setTimeout(() => btn.classList.remove('bloom'), 1200);
            });
        }
        setInterval(triggerAutoBloom, 2500);

        // === STATION NAVIGATION ===
        function startAnimation(targetPos) {
            isAnimating = true;
            animationProgress = 0;
            startPos.copy(camera.position);
            endPos.copy(targetPos);
            
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2.5));
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function nextStation() {
            if (isAnimating || !isJourneyStarted) return;
            
            if (currentStationIndex === 0) {
                currentStationIndex = 1;
            } else if (currentStationIndex < STATIONS.length - 1) {
                currentStationIndex++;
            } else {
                currentStationIndex = 1;
            }
            
            startAnimation(STATIONS[currentStationIndex].pos);
            
            if (currentStationIndex !== 1) hideNavBar();
        }

        function prevStation() {
            if (isAnimating || !isJourneyStarted) return;
            
            if (currentStationIndex === 0) {
                currentStationIndex = STATIONS.length - 1;
            } else if (currentStationIndex > 1) {
                currentStationIndex--;
            } else {
                currentStationIndex = STATIONS.length - 1;
            }
            
            startAnimation(STATIONS[currentStationIndex].pos);
            
            if (currentStationIndex !== 1) hideNavBar();
        }

        document.getElementById('prevBtn').onclick = prevStation;
        document.getElementById('nextBtn').onclick = nextStation;

        // === BEGIN JOURNEY ===
        window.beginJourney = function() {
            if (isJourneyStarted) return;
            isJourneyStarted = true;
            
            document.getElementById('whiteweb-overlay').classList.add('fade-out');
            document.getElementById('mobile-menu').style.display = 'none';
            
            setTimeout(() => {
                document.getElementById('tripweb-interface').classList.add('visible');
            }, 600);
            
            currentStationIndex = 1;
            startAnimation(STATIONS[1].pos);
            
            setTimeout(() => {
                if (currentStationIndex === 1 && !isAnimating) {
                    showNavBar();
                }
            }, ANIMATION_DURATION * 1000 + 600);
        };

        // === MOBILE MENU ===
        window.toggleMobileMenu = function() {
            const menu = document.getElementById('mobile-menu');
            menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
        };

        // === ANIMATION LOOP ===
        let glowTime = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            glowTime += 0.015;
            const glowPulse = 0.3 + Math.sin(glowTime) * 0.15;
            bloomPass.strength = glowPulse;
            centerLight.intensity = 0.5 + Math.sin(glowTime * 1.3) * 0.3;
            
            for (let i = 2; i < cards.length; i++) {
                if (cards[i]) {
                    if (i === currentStationIndex && isJourneyStarted) {
                        cards[i].lookAt(camera.position);
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.85, 0.08);
                    } else {
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.0, 0.08);
                    }
                }
            }
            
            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                
                if (animationProgress >= 1) {
                    animationProgress = 1;
                    isAnimating = false;
                    
                    if (currentStationIndex === 1 && isJourneyStarted) {
                        showNavBar();
                    }
                }
                
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start;
                const p1 = window.animControlPoints.mid;
                const p2 = window.animControlPoints.end;
                
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }
            
            composer.render();
        }
        
        animate();

        // === RESIZE HANDLER ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
