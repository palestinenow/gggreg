<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Orbit - Ultimate Filter Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #blocker { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer; }
        #instructions { color: white; text-align: center; padding: 30px; border: 2px solid #fff; border-radius: 10px; background: #111; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin: 0 0 10px 0; color: #fff; } p { margin: 0; color: #ccc; }
        #actions { position: absolute; bottom: 40px; right: 40px; z-index: 100; display: flex; gap: 15px; }
        button.main-btn { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 18px; border-radius: 50px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button.main-btn:hover { background: #333; transform: translateY(-2px); border-color: #fff; }
        #status { position: absolute; bottom: 40px; left: 40px; color: #fff; font-size: 14px; z-index: 100; opacity: 0.7; }
        
        /* Vignette overlay */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(circle at center, transparent 51%, rgba(0,0,0,0.30) 80%, rgba(0,0,0,0.50) 100%);
            transition: backdrop-filter 0.5s ease;
        }
        
        /* Filter Lab Panel */
        #filter-lab {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 15px;
            font-family: 'Inter', sans-serif;
            z-index: 300;
            max-height: 85vh;
            overflow-y: auto;
            min-width: 280px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        
        #filter-lab h3 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .filter-category {
            margin-bottom: 20px;
        }
        
        .filter-category h4 {
            margin: 10px 0;
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.05);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            border-radius: 20px;
            transition: all 0.2s;
            text-align: left;
        }
        
        .filter-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }
        
        .filter-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
        
        .slider-container {
            margin-top: 10px;
        }
        
        .slider-container label {
            display: block;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .slider-container input {
            width: 100%;
            margin: 5px 0;
        }
        
        #toggle-lab {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            border-radius: 30px;
            z-index: 301;
            backdrop-filter: blur(5px);
        }
        
        #toggle-lab:hover {
            background: #fff;
            color: #000;
        }
        
        /* Glass Navigation Bar */
        .glass-nav {
            position: fixed;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 680px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 50px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0;
            pointer-events: none;
            z-index: 150;
        }

        .glass-nav.visible { opacity: 1; pointer-events: auto; animation: fadeEnter 1.2s 0.2s forwards; }
        @keyframes fadeEnter { to { opacity: 1; transform: translate(-50%, -50%); } }
        .glass-nav.vanish { opacity: 0; transform: translate(-50%, -50%) scale(0.94) translateY(-20px); filter: blur(12px); pointer-events: none; }
        
        .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.25); flex-shrink: 0; }
        .input-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
        .glass-input {
            width: 100%; background: transparent; border: none; outline: none;
            color: rgba(255,255,255,0.9); font-family: 'Inter', sans-serif;
            font-weight: 300; font-size: 0.95rem; text-align: center;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.35); font-family: 'Playfair Display', serif; font-style: italic; }
        input[type="date"] { color-scheme: dark; cursor: pointer; text-transform: uppercase; }
        
        .conf-msg {
            font-family: 'Playfair Display', serif; color: rgba(255,255,255,0.95);
            font-size: 0.95rem; text-align: center; opacity: 0;
            transform: translateY(5px); transition: all 0.6s;
        }
        .conf-msg.show { opacity: 1; transform: translateY(0); }
        .conf-msg em { font-style: normal; color: #a5b4fc; font-weight: 500; }
        
        .send-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; flex-shrink: 0;
        }
        .send-btn:hover { background: rgba(255,255,255,0.14); transform: scale(1.08); }
        .send-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        
        /* Snow canvas */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 60;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        /* Film grain */
        #grain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 55;
            opacity: 0;
            transition: opacity 0.5s;
            mix-blend-mode: overlay;
        }
        
        /* Letterbox bars */
        .letterbox {
            position: fixed;
            left: 0;
            width: 100%;
            height: 0;
            background: #000;
            z-index: 70;
            pointer-events: none;
            transition: height 0.5s;
        }
        .letterbox-top { top: 0; }
        .letterbox-bottom { bottom: 0; }
        
        /* Chromatic aberration overlay */
        #chroma-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 65;
            opacity: 0;
            transition: opacity 0.5s;
            mix-blend-mode: screen;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1>🎬 CINEMATIC FILTER LAB</h1>
            <p>Click to start. Toggle filters to create your perfect look.</p>
        </div>
    </div>

    <div id="actions">
        <button class="main-btn" onclick="prevStation()">⬅️ PREVIOUS</button>
        <button class="main-btn" onclick="nextStation()">NEXT ➡️</button>
    </div>

    <div id="status">Ready...</div>
    
    <div id="vignette"></div>
    <canvas id="snow-canvas"></canvas>
    <canvas id="grain-canvas"></canvas>
    <div id="chroma-overlay"></div>
    <div class="letterbox letterbox-top"></div>
    <div class="letterbox letterbox-bottom"></div>
    
    <!-- Glass Navigation Bar -->
    <nav class="glass-nav" id="glassNav">
        <div class="dot"></div>
        <div class="input-wrap" id="inputWrap"></div>
        <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
        <div class="dot"></div>
    </nav>
    
    <button id="toggle-lab" onclick="toggleFilterLab()">🎨 FILTER LAB</button>
    
    <div id="filter-lab" style="display: none;">
        <h3>🎬 CINEMATIC FILTERS</h3>
        
        <div class="filter-category">
            <h4>🌈 COLOR GRADING</h4>
            <div class="filter-grid">
                <button class="filter-btn" data-filter="tealOrange">🎬 Teal & Orange</button>
                <button class="filter-btn" data-filter="bw">⚫ Black & White</button>
                <button class="filter-btn" data-filter="sepia">📜 Sepia</button>
                <button class="filter-btn" data-filter="cyberpunk">🌆 Cyberpunk</button>
                <button class="filter-btn" data-filter="noir">🕵️ Noir</button>
                <button class="filter-btn" data-filter="vintage">📷 Vintage</button>
                <button class="filter-btn" data-filter="cool">❄️ Cool Blue</button>
                <button class="filter-btn" data-filter="warm">☀️ Warm Glow</button>
                <button class="filter-btn" data-filter="matrix">💚 Matrix</button>
                <button class="filter-btn" data-filter="sunset">🌅 Sunset</button>
            </div>
        </div>
        
        <div class="filter-category">
            <h4>✨ LIGHT EFFECTS</h4>
            <div class="filter-grid">
                <button class="filter-btn" data-filter="bloom">✨ Bloom</button>
                <button class="filter-btn" data-filter="lensflare">💫 Lens Flare</button>
                <button class="filter-btn" data-filter="godrays">☀️ God Rays</button>
                <button class="filter-btn" data-filter="sparkles">⭐ Sparkles</button>
                <button class="filter-btn" data-filter="glow">🔮 Glow Pulse</button>
                <button class="filter-btn" data-filter="neon">💜 Neon Leak</button>
            </div>
        </div>
        
        <div class="filter-category">
            <h4>📽️ FILM EFFECTS</h4>
            <div class="filter-grid">
                <button class="filter-btn" data-filter="grain">🎞️ Film Grain</button>
                <button class="filter-btn" data-filter="vignette">🔲 Vignette</button>
                <button class="filter-btn" data-filter="letterbox">🎬 Letterbox</button>
                <button class="filter-btn" data-filter="chromatic">🌈 Chromatic Aberration</button>
                <button class="filter-btn" data-filter="scanlines">📺 Scanlines</button>
                <button class="filter-btn" data-filter="vhs">📼 VHS Glitch</button>
            </div>
        </div>
        
        <div class="filter-category">
            <h4>❄️ ATMOSPHERE</h4>
            <div class="filter-grid">
                <button class="filter-btn" data-filter="snow">❄️ Snow</button>
                <button class="filter-btn" data-filter="fog">🌫️ Fog</button>
                <button class="filter-btn" data-filter="rain">🌧️ Rain</button>
                <button class="filter-btn" data-filter="dust">✨ Dust Particles</button>
                <button class="filter-btn" data-filter="stars">⭐ Stars</button>
                <button class="filter-btn" data-filter="aurora">🌌 Aurora</button>
            </div>
        </div>
        
        <div class="filter-category">
            <h4>🎨 ARTISTIC</h4>
            <div class="filter-grid">
                <button class="filter-btn" data-filter="posterize">🖼️ Posterize</button>
                <button class="filter-btn" data-filter="edgeglow">💡 Edge Glow</button>
                <button class="filter-btn" data-filter="dream">💭 Dream Blur</button>
                <button class="filter-btn" data-filter="invert">🔲 Invert</button>
                <button class="filter-btn" data-filter="thermal">🌡️ Thermal</button>
                <button class="filter-btn" data-filter="hologram">📡 Hologram</button>
            </div>
        </div>
        
        <div class="slider-container">
            <label>🎚️ Intensity: <span id="intensity-val">100%</span></label>
            <input type="range" id="intensity" min="0" max="100" value="100">
        </div>
        
        <div style="margin-top: 15px; text-align: center;">
            <button onclick="resetAllFilters()" style="background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold;">🔄 RESET ALL</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';
        import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { RGBShiftShader } from 'three/addons/shaders/RGBShiftShader.js';
        import { DotScreenPass } from 'three/addons/postprocessing/DotScreenPass.js';
        import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
        import { HalftonePass } from 'three/addons/postprocessing/HalftonePass.js';
        import { SAOPass } from 'three/addons/postprocessing/SAOPass.js';
        import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

        // Filter state management
        const activeFilters = new Set();
        let filterIntensity = 1.0;
        
        // Toggle filter lab
        window.toggleFilterLab = function() {
            const lab = document.getElementById('filter-lab');
            lab.style.display = lab.style.display === 'none' ? 'block' : 'none';
        };
        
        // Reset all filters
        window.resetAllFilters = function() {
            activeFilters.clear();
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            updateFilterDisplay();
        };
        
        // Filter button handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.dataset.filter;
                if (activeFilters.has(filter)) {
                    activeFilters.delete(filter);
                    btn.classList.remove('active');
                } else {
                    activeFilters.add(filter);
                    btn.classList.add('active');
                }
                updateFilterDisplay();
            });
        });
        
        // Intensity slider
        document.getElementById('intensity').addEventListener('input', (e) => {
            filterIntensity = e.target.value / 100;
            document.getElementById('intensity-val').textContent = e.target.value + '%';
            updateFilterDisplay();
        });
        
        function updateFilterDisplay() {
            // Update body classes for CSS filters
            document.body.className = '';
            activeFilters.forEach(filter => {
                document.body.classList.add('filter-' + filter);
            });
            
            // Apply intensity
            document.body.style.setProperty('--filter-intensity', filterIntensity);
        }

        // Glass Nav functionality
        const nav = document.getElementById('glassNav');
        const inputWrap = document.getElementById('inputWrap');
        const btn = document.getElementById('sendBtn');
        
        let step = 1;
        let navShown = false;

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString + 'T00:00:00').toLocaleDateString('en-US', options);
        }

        function initNav() {
            inputWrap.innerHTML = `<input type="text" class="glass-input" id="mainInput" placeholder="You are in front of the tree of life. Make a wish..." autocomplete="off">`;
            const inp = document.getElementById('mainInput');
            if (inp) {
                inp.focus();
                inp.addEventListener('keydown', (e) => e.key === 'Enter' && handleSend());
            }
        }

        function handleSend() {
            const inp = document.querySelector('.glass-input');
            const val = inp?.value.trim();
            
            if (step === 1) {
                if (!val) return;
                step = 2;
                inputWrap.style.opacity = '0';
                setTimeout(() => {
                    inputWrap.innerHTML = `<input type="date" class="glass-input" id="dateInput" required>`;
                    inputWrap.style.opacity = '1';
                    const dateInp = document.getElementById('dateInput');
                    if (dateInp) {
                        dateInp.focus();
                        dateInp.addEventListener('keydown', (e) => e.key === 'Enter' && handleSend());
                    }
                }, 250);
            } else if (step === 2) {
                if (!val) return;
                step = 3;
                const displayDate = formatDate(val);
                btn.style.opacity = '0';
                btn.style.pointerEvents = 'none';
                inputWrap.style.opacity = '0';
                setTimeout(() => {
                    inputWrap.innerHTML = `<p class="conf-msg" id="confMsg">Come back on <em>${displayDate}</em>.<br>Your wish will become true.</p>`;
                    inputWrap.style.opacity = '1';
                    requestAnimationFrame(() => document.getElementById('confMsg')?.classList.add('show'));
                    setTimeout(() => {
                        nav.classList.add('vanish');
                        nav.classList.remove('visible');
                        step = 1;
                        btn.style.opacity = '1';
                        btn.style.pointerEvents = 'auto';
                    }, 3500);
                }, 300);
            }
        }

        btn.addEventListener('click', handleSend);
        initNav();

        function showNavBar() {
            if (!navShown) {
                nav.classList.remove('vanish');
                nav.classList.add('visible');
                navShown = true;
                step = 1;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
                initNav();
            }
        }

        function hideNavBar() {
            nav.classList.remove('visible');
            nav.classList.add('vanish');
        }

        // Snow effect
        const snowCanvas = document.getElementById('snow-canvas');
        const snowCtx = snowCanvas.getContext('2d');
        let snowflakes = [];
        
        function initSnow() {
            snowCanvas.width = window.innerWidth;
            snowCanvas.height = window.innerHeight;
            snowflakes = [];
            for (let i = 0; i < 100; i++) {
                snowflakes.push({
                    x: Math.random() * snowCanvas.width,
                    y: Math.random() * snowCanvas.height,
                    radius: Math.random() * 3 + 1,
                    speed: Math.random() * 2 + 1,
                    opacity: Math.random() * 0.5 + 0.3
                });
            }
        }
        
        function animateSnow() {
            if (!activeFilters.has('snow')) {
                snowCanvas.style.opacity = '0';
                return;
            }
            snowCanvas.style.opacity = filterIntensity.toString();
            snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);
            snowCtx.fillStyle = 'white';
            snowflakes.forEach(flake => {
                snowCtx.beginPath();
                snowCtx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                snowCtx.fillStyle = `rgba(255, 255, 255, ${flake.opacity * filterIntensity})`;
                snowCtx.fill();
                flake.y += flake.speed;
                if (flake.y > snowCanvas.height) {
                    flake.y = 0;
                    flake.x = Math.random() * snowCanvas.width;
                }
            });
            requestAnimationFrame(animateSnow);
        }
        
        // Film grain
        const grainCanvas = document.getElementById('grain-canvas');
        const grainCtx = grainCanvas.getContext('2d');
        
        function initGrain() {
            grainCanvas.width = window.innerWidth;
            grainCanvas.height = window.innerHeight;
        }
        
        function animateGrain() {
            if (!activeFilters.has('grain')) {
                grainCanvas.style.opacity = '0';
                return;
            }
            grainCanvas.style.opacity = (0.15 * filterIntensity).toString();
            const imageData = grainCtx.createImageData(grainCanvas.width, grainCanvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const noise = Math.random() * 255;
                data[i] = noise;
                data[i+1] = noise;
                data[i+2] = noise;
                data[i+3] = 255;
            }
            grainCtx.putImageData(imageData, 0, 0);
            requestAnimationFrame(animateGrain);
        }
        
        // Letterbox
        function updateLetterbox() {
            const bars = document.querySelectorAll('.letterbox');
            if (activeFilters.has('letterbox')) {
                const height = (window.innerHeight * 0.1 * filterIntensity) + 'px';
                bars[0].style.height = height;
                bars[1].style.height = height;
            } else {
                bars[0].style.height = '0';
                bars[1].style.height = '0';
            }
        }
        
        // Chromatic aberration
        function updateChromatic() {
            const overlay = document.getElementById('chroma-overlay');
            if (activeFilters.has('chromatic')) {
                overlay.style.opacity = (0.3 * filterIntensity).toString();
                overlay.style.background = 'transparent';
                overlay.style.boxShadow = `
                    ${1 * filterIntensity}px 0 0 rgba(255,0,0,0.2),
                    ${-1 * filterIntensity}px 0 0 rgba(0,255,255,0.2)
                `;
            } else {
                overlay.style.opacity = '0';
            }
        }

        // --- THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Composer with multiple passes
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        
        // Bloom pass
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.23;
        bloomPass.radius = 0.8;
        composer.addPass(bloomPass);
        
        // Film pass
        const filmPass = new FilmPass(0.35, 0.5, 2048, false);
        filmPass.renderToScreen = false;
        composer.addPass(filmPass);
        
        // RGB Shift pass
        const rgbShiftPass = new ShaderPass(RGBShiftShader);
        rgbShiftPass.uniforms['amount'].value = 0.0025;
        composer.addPass(rgbShiftPass);
        
        // Glitch pass
        const glitchPass = new GlitchPass();
        glitchPass.goWild = false;
        composer.addPass(glitchPass);
        
        // Afterimage pass for trails
        const afterimagePass = new AfterimagePass(0.9);
        composer.addPass(afterimagePass);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffeeff, 2); 
        spotLight.position.set(0, 10, 0); 
        spotLight.angle = Math.PI / 4; 
        spotLight.penumbra = 0.5; 
        spotLight.decay = 1; 
        spotLight.distance = 50; 
        spotLight.castShadow = true; 
        scene.add(spotLight); 
        spotLight.target.position.set(-0.006, 1.041, -0.008);
        scene.add(spotLight.target);
        
        const centerLight = new THREE.PointLight(0xff00ff, 0.46, 10); 
        centerLight.position.set(-0.006, 1.041, -0.008); 
        scene.add(centerLight);

        // Glow pulse
        let glowStartTime = Date.now();
        let glowDurationUp = 10000 + Math.random() * 20000;
        let glowDurationDown = 10000 + Math.random() * 20000;
        let isGlowingUp = true;
        let MIN_STRENGTH = 0.10;
        let MAX_STRENGTH = 0.40;
        
        function updateGlow() {
            const now = Date.now();
            const elapsed = now - glowStartTime;
            
            if (activeFilters.has('glow') || activeFilters.has('bloom')) {
                if (isGlowingUp) {
                    const progress = Math.min(elapsed / glowDurationUp, 1);
                    const strength = MIN_STRENGTH + (MAX_STRENGTH - MIN_STRENGTH) * progress;
                    bloomPass.strength = strength * filterIntensity;
                    centerLight.intensity = strength * 2.0 * filterIntensity;
                    if (progress >= 1) {
                        isGlowingUp = false;
                        glowStartTime = now;
                        glowDurationDown = 10000 + Math.random() * 20000;
                    }
                } else {
                    const progress = Math.min(elapsed / glowDurationDown, 1);
                    const strength = MAX_STRENGTH - (MAX_STRENGTH - MIN_STRENGTH) * progress;
                    bloomPass.strength = strength * filterIntensity;
                    centerLight.intensity = strength * 2.0 * filterIntensity;
                    if (progress >= 1) {
                        isGlowingUp = true;
                        glowStartTime = now;
                        glowDurationUp = 10000 + Math.random() * 20000;
                    }
                }
            } else {
                bloomPass.strength = 0;
                centerLight.intensity = 0;
            }
        }

        // Stations
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        const cardPositions = {
            2: { x: 0.10, y: 1.20, z: 4.00 },
            3: { x: 3.60, y: 1.25, z: 1.20 },
            4: { x: 2.20, y: 1.20, z: -3.20 },
            5: { x: -2.20, y: 1.25, z: -2.70 }
        };

        const cards = [];
        
        function createCard(stationName, stationIndex) {
            const canvas = document.createElement('canvas'); 
            canvas.width = 512; 
            canvas.height = 512;
            const context = canvas.getContext('2d');
            context.fillStyle = 'rgba(255, 255, 255, 0.05)'; 
            context.fillRect(0, 0, 512, 512);
            context.shadowColor = 'rgba(0, 0, 0, 1.0)';
            context.shadowBlur = 20;
            context.shadowOffsetX = 4;
            context.shadowOffsetY = 4;
            context.font = 'bold 70px Arial'; 
            context.fillStyle = '#ffffff'; 
            context.textAlign = 'center';
            context.fillText(stationName, 256, 200);
            context.font = 'bold 45px Arial'; 
            context.fillStyle = '#ffffff';
            context.fillText(`Station ${stationIndex}`, 256, 300);
            context.font = 'bold 32px Arial';
            context.fillStyle = '#ffffff';
            context.fillText('Viewpoint', 256, 370);
            context.shadowColor = 'transparent';
            
            const pageTexture = new THREE.CanvasTexture(canvas);
            const pageMaterial = new THREE.MeshStandardMaterial({ 
                map: pageTexture, transparent: true, opacity: 0.0, roughness: 0.05, metalness: 0.0,
                side: THREE.DoubleSide, depthWrite: false, blending: THREE.NormalBlending,
                emissive: new THREE.Color(0xffffff), emissiveIntensity: 0.5
            });
            const pageGeometry = new THREE.PlaneGeometry(1.8, 1.8);
            return new THREE.Mesh(pageGeometry, pageMaterial);
        }

        function positionCards() {
            for (let i = 2; i <= 5; i++) {
                if (cards[i] && cardPositions[i]) {
                    cards[i].position.set(cardPositions[i].x, cardPositions[i].y, cardPositions[i].z);
                    cards[i].lookAt(POINT_CENTER);
                }
            }
        }

        for (let i = 2; i < STATIONS.length; i++) {
            const card = createCard(STATIONS[i].name, i);
            cards[i] = card;
            scene.add(card);
        }

        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 2.5;

        // Load model
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => { 
                if (child.isMesh) { 
                    child.castShadow = true; 
                    child.receiveShadow = true; 
                    if (child.name.toLowerCase().includes('tree')) { 
                        child.material.emissive = new THREE.Color(0xaa00aa); 
                        child.material.emissiveIntensity = 0.5; 
                    } 
                } 
            });
            scene.add(model);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
            positionCards();
        }, undefined, function (error) { console.error(error); });

        document.getElementById('blocker').addEventListener('click', function() { 
            this.style.display = 'none'; 
            document.getElementById('status').innerText = "Tour Started"; 
        });

        window.nextStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) currentStationIndex = 1;
            else if (currentStationIndex < STATIONS.length - 1) currentStationIndex++;
            else currentStationIndex = 1;
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
            if (currentStationIndex === 1) showNavBar();
            else hideNavBar();
        };

        window.prevStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) currentStationIndex = STATIONS.length - 1;
            else if (currentStationIndex > 1) currentStationIndex--;
            else currentStationIndex = STATIONS.length - 1;
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
            if (currentStationIndex === 1) showNavBar();
            else hideNavBar();
        };

        function startAnimation(targetPos) {
            isAnimating = true; 
            animationProgress = 0; 
            startPos.copy(camera.position); 
            endPos.copy(targetPos);
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            updateGlow();
            updateLetterbox();
            updateChromatic();
            
            // Update passes based on active filters
            filmPass.enabled = activeFilters.has('grain') || activeFilters.has('vintage');
            rgbShiftPass.enabled = activeFilters.has('chromatic');
            glitchPass.enabled = activeFilters.has('vhs');
            afterimagePass.enabled = activeFilters.has('dream');
            
            if (activeFilters.has('vhs') && Math.random() < 0.01) {
                glitchPass.goWild = true;
                setTimeout(() => glitchPass.goWild = false, 200);
            }

            for (let i = 2; i < cards.length; i++) {
                if (cards[i]) {
                    if (i === currentStationIndex) {
                        cards[i].lookAt(camera.position);
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.8, 0.1);
                    } else {
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.0, 0.1);
                    }
                }
            }

            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) { 
                    animationProgress = 1; 
                    isAnimating = false; 
                }
                const t = animationProgress < 0.5 ? 4 * animationProgress * animationProgress * animationProgress : 1 - Math.pow(-2 * animationProgress + 2, 3) / 2;
                camera.position.lerpVectors(startPos, endPos, t);
                camera.lookAt(POINT_CENTER);
            }

            composer.render();
        }
        
        initSnow();
        initGrain();
        animateSnow();
        animateGrain();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            initSnow();
            initGrain();
            updateLetterbox();
        });
    </script>
</body>
</html>
