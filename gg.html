<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed 3D Kitchen</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; z-index: 999;
        }
        #instructions {
            color: white; text-align: center; cursor: pointer; padding: 20px; border: 2px solid #fff;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading">Loading Textures...</div>

    <div id="blocker">
        <div id="instructions">
            <h1>CLICK TO PLAY</h1>
            <p>WASD to Move | Mouse to Look | ESC to Exit</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202020);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS (Make it bright so we see colors) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); // Very bright ambient
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => {
            blocker.style.display = 'none';
            document.getElementById('loading').style.display = 'none';
        });
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');

        scene.add(controls.getObject());

        // --- MOVEMENT ---
        let moveF = false, moveB = false, moveL = false, moveR = false;
        
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW' || e.code === 'KeyZ') moveF = true;
            if(e.code === 'KeyS') moveB = true;
            if(e.code === 'KeyA' || e.code === 'KeyQ') moveL = true;
            if(e.code === 'KeyD') moveR = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW' || e.code === 'KeyZ') moveF = false;
            if(e.code === 'KeyS') moveB = false;
            if(e.code === 'KeyA' || e.code === 'KeyQ') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });

        // --- LOAD MODEL WITH TEXTURE FIX ---
        const loader = new GLTFLoader();
        
        // This manager helps us fix texture paths automatically
        const manager = new THREE.LoadingManager();
        manager.onLoad = function () {
            console.log('All resources loaded!');
        };

        loader.load('./droid-workshop-kitchen.gltf', function (gltf) {
            const model = gltf.scene;
            
            // FORCE TEXTURES TO LOAD FROM 'textures/' FOLDER
            model.traverse((child) => {
                if (child.isMesh) {
                    if (child.material.map) {
                        // If texture exists but path is wrong, fix it
                        // Note: This assumes your .gltf has "uri": "filename.png" 
                        // and we want it to be "textures/filename.png"
                        
                        // We actually rely on the LoadingManager below to redirect requests
                    }
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(model);
            
            // Position Camera
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            controls.getObject().position.set(center.x, center.y + 5, center.z + 15);

        }, undefined, function (error) {
            console.error(error);
            document.getElementById('loading').innerText = "ERROR: Check Console (F12)";
        });

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (controls.isLocked) {
                if(moveF) controls.moveForward(0.1);
                if(moveB) controls.moveForward(-0.1);
                if(moveL) controls.moveRight(-0.1);
                if(moveR) controls.moveRight(0.1);
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
