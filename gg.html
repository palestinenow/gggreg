<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Orbit ezd Glass Effect</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
        #blocker { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer; }
        #instructions { color: black; text-align: center; padding: 30px; border: 2px solid #333; border-radius: 10px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 10px 0; color: #333; } p { margin: 0; color: #666; }
        #actions { position: absolute; bottom: 40px; right: 40px; z-index: 100; display: flex; gap: 15px; }
        button.main-btn { background: #333; color: #fff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 18px; border-radius: 50px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        button.main-btn:hover { background: #000; transform: translateY(-2px); }
        #status { position: absolute; bottom: 40px; left: 40px; color: #333; font-size: 14px; z-index: 100; opacity: 0.7; }
        
        /* Vignette overlay */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(circle at center, transparent 51%, rgba(0,0,0,0.30) 80%, rgba(0,0,0,0.50) 100%);
            transition: backdrop-filter 0.5s ease;
        }
        
        /* Control Panel */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            z-index: 200;
            max-height: 90vh;
            overflow-y: auto;
            min-width: 300px;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
            pointer-events: auto;
        }
        
        #control-panel h3 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #0f0;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
        }
        
        #control-panel h4 {
            margin: 15px 0 10px 0;
            color: #0f0;
        }
        
        .control-group {
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
        }
        
        .station-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .station-btn {
            background: #003300;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px 12px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
            transition: all 0.2s;
            flex: 1;
        }
        
        .station-btn:hover {
            background: #0f0;
            color: black;
        }
        
        .station-btn.active {
            background: #0f0;
            color: black;
            font-weight: bold;
        }
        
        .pos-control {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .pos-control label {
            width: 20px;
            color: #0f0;
            font-weight: bold;
        }
        
        .pos-control input {
            flex: 1;
            margin: 0 10px;
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 5px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .pos-control button {
            background: #003300;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 3px;
            margin-left: 5px;
        }
        
        .pos-control button:hover {
            background: #0f0;
            color: black;
        }
        
        .slider-control {
            margin-bottom: 15px;
        }
        
        .slider-control label {
            display: block;
            margin-bottom: 5px;
            color: #0f0;
        }
        
        .slider-control input {
            width: 100%;
            margin: 5px 0;
        }
        
        .slider-control span {
            color: #0f0;
            float: right;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .action-btn {
            background: #003300;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 5px;
            flex: 1;
            font-weight: bold;
        }
        
        .action-btn:hover {
            background: #0f0;
            color: black;
        }
        
        #toggle-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #003300;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            border-radius: 5px;
            z-index: 201;
        }
        
        #toggle-panel:hover {
            background: #0f0;
            color: black;
        }
        
        .coord-display {
            color: #0f0;
            font-size: 11px;
            margin-top: 5px;
            text-align: center;
        }
        
        #blur-status {
            color: #0f0;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1>CINEMATIC TOUR</h1>
            <p>Click to start.<br>The card is now real frosted glass.</p>
        </div>
    </div>

    <div id="actions">
        <button class="main-btn" onclick="prevStation()">⬅️ PREVIOUS</button>
        <button class="main-btn" onclick="nextStation()">NEXT ➡️</button>
    </div>

    <div id="status">Ready...</div>
    
    <div id="vignette"></div>
    
    <button id="toggle-panel" onclick="toggleControlPanel()">🎮 CONTROLS</button>
    
    <div id="control-panel" style="display: none;">
        <h3>🎛️ DEBUG CONTROLS</h3>
        
        <div class="control-group">
            <h4>📍 SELECT STATION CARD</h4>
            <div class="station-selector">
                <button class="station-btn" onclick="selectStation(1)">C: First</button>
                <button class="station-btn" onclick="selectStation(2)">D: 2</button>
                <button class="station-btn" onclick="selectStation(3)">E: 3</button>
                <button class="station-btn" onclick="selectStation(4)">F: 4</button>
                <button class="station-btn" onclick="selectStation(5)">G: 5</button>
            </div>
            <div id="selected-station" class="coord-display">Selected: Station C</div>
        </div>
        
        <div class="control-group">
            <h4>🎯 CARD POSITION</h4>
            <div class="pos-control">
                <label>X:</label>
                <input type="number" id="pos-x" step="0.01" value="-3.61">
                <button onclick="moveCard('x', -0.1)">-</button>
                <button onclick="moveCard('x', 0.1)">+</button>
            </div>
            <div class="pos-control">
                <label>Y:</label>
                <input type="number" id="pos-y" step="0.01" value="1.30">
                <button onclick="moveCard('y', -0.1)">-</button>
                <button onclick="moveCard('y', 0.1)">+</button>
            </div>
            <div class="pos-control">
                <label>Z:</label>
                <input type="number" id="pos-z" step="0.01" value="1.17">
                <button onclick="moveCard('z', -0.1)">-</button>
                <button onclick="moveCard('z', 0.1)">+</button>
            </div>
            <div style="margin-top: 10px;">
                <button class="action-btn" onclick="applyPosition()">✅ Apply Position</button>
                <button class="action-btn" onclick="copyPosition()">📋 Copy Coordinates</button>
            </div>
        </div>
        
        <div class="control-group">
            <h4>🎨 VIGNETTE EFFECT</h4>
            <div class="slider-control">
                <label>Center Clear Area: <span id="vignette-center-val">51%</span></label>
                <input type="range" id="vignette-center" min="20" max="60" value="51" step="1">
            </div>
            <div class="slider-control">
                <label>Edge Darkness: <span id="vignette-darkness-val">50%</span></label>
                <input type="range" id="vignette-darkness" min="0" max="50" value="50" step="1">
            </div>
            <div class="slider-control">
                <label>Mid Darkness: <span id="vignette-mid-val">30%</span></label>
                <input type="range" id="vignette-mid" min="0" max="30" value="30" step="1">
            </div>
            <div class="slider-control">
                <label>Blur Amount: <span id="vignette-blur-val">0px</span></label>
                <input type="range" id="vignette-blur" min="0" max="5" value="0" step="0.5">
            </div>
            <div id="blur-status">Blur: INACTIVE</div>
        </div>
        
        <div class="control-group">
            <h4>✨ GLOW EFFECT</h4>
            <div class="slider-control">
                <label>Min Strength: <span id="glow-min-val">23%</span></label>
                <input type="range" id="glow-min" min="0" max="30" value="23" step="1">
            </div>
            <div class="slider-control">
                <label>Max Strength: <span id="glow-max-val">39%</span></label>
                <input type="range" id="glow-max" min="20" max="80" value="39" step="1">
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" onclick="saveSettings()">💾 SAVE SETTINGS</button>
            <button class="action-btn" onclick="exportConfig()">📤 EXPORT CONFIG</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Make functions globally available
        window.toggleControlPanel = function() {
            const panel = document.getElementById('control-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        };
        
        let selectedStation = 1;
        window.selectStation = function(index) {
            selectedStation = index;
            const stationNames = ['', 'C: First', 'D: 2', 'E: 3', 'F: 4', 'G: 5'];
            document.getElementById('selected-station').textContent = `Selected: Station ${stationNames[index]}`;
            
            if (cards[index]) {
                document.getElementById('pos-x').value = cards[index].position.x.toFixed(2);
                document.getElementById('pos-y').value = cards[index].position.y.toFixed(2);
                document.getElementById('pos-z').value = cards[index].position.z.toFixed(2);
            }
            
            document.querySelectorAll('.station-btn').forEach((btn, i) => {
                if (i === index - 1) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        };
        
        window.moveCard = function(axis, delta) {
            const input = document.getElementById(`pos-${axis}`);
            input.value = (parseFloat(input.value) + delta).toFixed(2);
            applyPosition();
        };
        
        window.applyPosition = function() {
            if (cards[selectedStation]) {
                const x = parseFloat(document.getElementById('pos-x').value);
                const y = parseFloat(document.getElementById('pos-y').value);
                const z = parseFloat(document.getElementById('pos-z').value);
                cards[selectedStation].position.set(x, y, z);
                cardPositions[selectedStation] = { x, y, z };
            }
        };
        
        window.copyPosition = function() {
            if (cards[selectedStation]) {
                const pos = cards[selectedStation].position;
                const text = `Station ${selectedStation}: (${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)})`;
                navigator.clipboard?.writeText(text);
                alert('Position copied: ' + text);
            }
        };
        
        window.saveSettings = function() {
            alert('Settings saved!');
        };
        
        window.exportConfig = function() {
            const config = {
                cards: cardPositions,
                vignette: {
                    center: document.getElementById('vignette-center').value,
                    darkness: document.getElementById('vignette-darkness').value,
                    mid: document.getElementById('vignette-mid').value
                },
                glow: {
                    min: MIN_STRENGTH,
                    max: MAX_STRENGTH
                }
            };
            console.log('CONFIG:', JSON.stringify(config, null, 2));
            alert('Config exported to console!');
        };

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- BLOOM EFFECT ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.23;
        bloomPass.radius = 0.8;
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffeeff, 2); 
        spotLight.position.set(0, 10, 0); 
        spotLight.angle = Math.PI / 4; 
        spotLight.penumbra = 0.5; 
        spotLight.decay = 1; 
        spotLight.distance = 50; 
        spotLight.castShadow = true; 
        scene.add(spotLight); 
        spotLight.target.position.set(-0.006, 1.041, -0.008);
        scene.add(spotLight.target);
        
        const centerLight = new THREE.PointLight(0xff00ff, 0.46, 10); 
        centerLight.position.set(-0.006, 1.041, -0.008); 
        scene.add(centerLight);

        // --- GLOW PULSE SYSTEM - 10-40% with random 10-30s timing ---
        let glowStartTime = Date.now();
        let glowDurationUp = 10000 + Math.random() * 20000;
        let glowDurationDown = 10000 + Math.random() * 20000;
        let isGlowingUp = true;
        
        let MIN_STRENGTH = 0.10;
        let MAX_STRENGTH = 0.40;
        
        document.getElementById('glow-min').addEventListener('input', (e) => {
            MIN_STRENGTH = e.target.value / 100;
            document.getElementById('glow-min-val').textContent = e.target.value + '%';
        });
        
        document.getElementById('glow-max').addEventListener('input', (e) => {
            MAX_STRENGTH = e.target.value / 100;
            document.getElementById('glow-max-val').textContent = e.target.value + '%';
        });
        
        function getRandomDuration() {
            return 10000 + Math.random() * 20000; // 10s to 30s
        }
        
        function updateGlow() {
            const now = Date.now();
            const elapsed = now - glowStartTime;
            
            if (isGlowingUp) {
                const progress = Math.min(elapsed / glowDurationUp, 1);
                const strength = MIN_STRENGTH + (MAX_STRENGTH - MIN_STRENGTH) * progress;
                bloomPass.strength = strength;
                centerLight.intensity = strength * 2.0;
                
                if (progress >= 1) {
                    isGlowingUp = false;
                    glowStartTime = now;
                    glowDurationDown = getRandomDuration();
                }
            } else {
                const progress = Math.min(elapsed / glowDurationDown, 1);
                const strength = MAX_STRENGTH - (MAX_STRENGTH - MIN_STRENGTH) * progress;
                bloomPass.strength = strength;
                centerLight.intensity = strength * 2.0;
                
                if (progress >= 1) {
                    isGlowingUp = true;
                    glowStartTime = now;
                    glowDurationUp = getRandomDuration();
                }
            }
        }

        // --- DYNAMIC BLUR SYSTEM - pulses to 1px then back to 0 ---
        let blurState = 'waiting';
        let blurStartTime = Date.now();
        let nextBlurTime = Date.now() + 4000 + Math.random() * 14000;
        
        function updateBlur() {
            const now = Date.now();
            const vignette = document.getElementById('vignette');
            const blurStatus = document.getElementById('blur-status');
            
            if (blurState === 'waiting' && now >= nextBlurTime) {
                blurState = 'active';
                blurStartTime = now;
                blurStatus.textContent = 'Blur: ACTIVE';
            }
            
            if (blurState === 'active') {
                const elapsed = (now - blurStartTime) / 1000;
                if (elapsed >= 1.0) {
                    blurState = 'waiting';
                    nextBlurTime = now + 4000 + Math.random() * 14000;
                    vignette.style.backdropFilter = 'blur(0px)';
                    blurStatus.textContent = 'Blur: INACTIVE';
                } else {
                    vignette.style.backdropFilter = `blur(1px)`;
                }
            }
            
            document.getElementById('vignette-blur-val').textContent = 
                vignette.style.backdropFilter.includes('1px') ? '1px' : '0px';
        }

        // --- VIGNETTE CONTROLS ---
        const vignette = document.getElementById('vignette');
        
        document.getElementById('vignette-center').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('vignette-center-val').textContent = val + '%';
            updateVignette();
        });
        
        document.getElementById('vignette-darkness').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('vignette-darkness-val').textContent = val + '%';
            updateVignette();
        });
        
        document.getElementById('vignette-mid').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('vignette-mid-val').textContent = val + '%';
            updateVignette();
        });
        
        function updateVignette() {
            const center = document.getElementById('vignette-center').value;
            const darkness = document.getElementById('vignette-darkness').value / 100;
            const mid = document.getElementById('vignette-mid').value / 100;
            
            vignette.style.background = `radial-gradient(circle at center, transparent ${center}%, rgba(0,0,0,${mid}) 80%, rgba(0,0,0,${darkness}) 100%)`;
        }

        // --- STATIONS ---
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        // EXACT CARD POSITIONS
        const cardPositions = {
            1: { x: -3.61, y: 1.30, z: 1.17 },
            2: { x: 0.10, y: 1.20, z: 4.00 },
            3: { x: 3.60, y: 1.25, z: 1.20 },
            4: { x: 2.20, y: 1.20, z: -3.20 },
            5: { x: -2.20, y: 1.25, z: -2.70 }
        };

        // --- CREATE CARDS (PURE WHITE TEXT) ---
        const cards = [];
        
        function createCard(stationName, stationIndex) {
            const canvas = document.createElement('canvas'); 
            canvas.width = 512; 
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            // Very subtle glass background
            context.fillStyle = 'rgba(255, 255, 255, 0.08)'; 
            context.fillRect(0, 0, 512, 512);
            
            // Strong text shadow for depth
            context.shadowColor = 'rgba(0, 0, 0, 0.8)';
            context.shadowBlur = 15;
            context.shadowOffsetX = 3;
            context.shadowOffsetY = 3;
            
            // Station name - PURE WHITE
            context.font = 'bold 65px Arial'; 
            context.fillStyle = '#ffffff'; 
            context.textAlign = 'center';
            context.fillText(stationName, 256, 200);
            
            // Subtitle - PURE WHITE
            context.font = 'bold 40px Arial'; 
            context.fillStyle = '#ffffff';
            context.fillText(`Station ${stationIndex}`, 256, 290);
            
            // Additional info - PURE WHITE
            context.font = 'bold 28px Arial';
            context.fillStyle = '#ffffff';
            context.fillText('Viewpoint', 256, 360);
            
            // Reset shadow
            context.shadowColor = 'transparent';
            context.shadowBlur = 0;
            context.shadowOffsetX = 0;
            context.shadowOffsetY = 0;
            
            const pageTexture = new THREE.CanvasTexture(canvas);
            
            const pageMaterial = new THREE.MeshStandardMaterial({ 
                map: pageTexture,
                transparent: true,
                opacity: 0.0,
                roughness: 0.05,
                metalness: 0.0,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.NormalBlending,
                emissive: new THREE.Color(0xffffff),
                emissiveIntensity: 0.3
            });
            
            const pageGeometry = new THREE.PlaneGeometry(1.8, 1.8);
            const card = new THREE.Mesh(pageGeometry, pageMaterial);
            
            return card;
        }

        function positionCards() {
            for (let i = 1; i <= 5; i++) {
                if (cards[i] && cardPositions[i]) {
                    cards[i].position.set(cardPositions[i].x, cardPositions[i].y, cardPositions[i].z);
                    cards[i].lookAt(POINT_CENTER);
                }
            }
        }

        for (let i = 1; i < STATIONS.length; i++) {
            const card = createCard(STATIONS[i].name, i);
            cards[i] = card;
            scene.add(card);
        }

        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 2.5;

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => { 
                if (child.isMesh) { 
                    child.castShadow = true; 
                    child.receiveShadow = true; 
                    if (child.name.toLowerCase().includes('tree')) { 
                        child.material.emissive = new THREE.Color(0xaa00aa); 
                        child.material.emissiveIntensity = 0.5; 
                    } 
                } 
            });
            scene.add(model);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
            positionCards();
        }, undefined, function (error) { console.error(error); });

        // --- UI LOGIC ---
        document.getElementById('blocker').addEventListener('click', function() { 
            this.style.display = 'none'; 
            document.getElementById('status').innerText = "Tour Started"; 
        });

        window.nextStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) {
                currentStationIndex = 1;
            } else if (currentStationIndex < STATIONS.length - 1) {
                currentStationIndex++;
            } else {
                currentStationIndex = 1;
            }
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
            
            if (currentStationIndex > 0) {
                selectStation(currentStationIndex);
            }
        };

        window.prevStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) {
                currentStationIndex = STATIONS.length - 1;
            } else if (currentStationIndex > 1) {
                currentStationIndex--;
            } else {
                currentStationIndex = STATIONS.length - 1;
            }
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
            
            if (currentStationIndex > 0) {
                selectStation(currentStationIndex);
            }
        };

        function startAnimation(targetPos) {
            isAnimating = true; 
            animationProgress = 0; 
            startPos.copy(camera.position); 
            endPos.copy(targetPos);
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2)); 
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) { 
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; 
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            updateGlow();
            updateBlur();

            for (let i = 1; i < cards.length; i++) {
                if (cards[i]) {
                    if (i === currentStationIndex) {
                        cards[i].lookAt(camera.position);
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.7, 0.1);
                    } else {
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.0, 0.1);
                    }
                }
            }

            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) { 
                    animationProgress = 1; 
                    isAnimating = false; 
                    document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`; 
                }
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start; 
                const p1 = window.animControlPoints.mid; 
                const p2 = window.animControlPoints.end;
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }

            composer.render();
        }
        animate();
        
        setTimeout(() => selectStation(1), 100);
        
        // Set initial values
        document.getElementById('glow-min').value = 23;
        document.getElementById('glow-max').value = 39;
        MIN_STRENGTH = 0.23;
        MAX_STRENGTH = 0.39;
        updateVignette();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
