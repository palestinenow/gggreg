<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fast 3D Walk - New Model</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; z-index: 999;
        }
        #instructions {
            color: white; text-align: center; cursor: pointer; padding: 20px; border: 2px solid #fff; border-radius: 10px;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; z-index: 1000; pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="loading">Loading World...</div>
    <div id="crosshair"></div>

    <div id="blocker">
        <div id="instructions">
            <h1>CLICK TO PLAY</h1>
            <p>WASD / ZQSD to SPRINT<br>Mouse to Look<br>ESC to Stop</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202020);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');
        const loading = document.getElementById('loading');

        instructions.addEventListener('click', () => controls.lock());
        
        controls.addEventListener('lock', () => {
            blocker.style.display = 'none';
        });
        
        controls.addEventListener('unlock', () => {
            blocker.style.display = 'flex';
        });

        scene.add(controls.getObject());

        // --- MOVEMENT VARIABLES ---
        let moveF = false, moveB = false, moveL = false, moveR = false;
        
        // ⚡ SPEED SETTING: Very fast sprint
        const MOVEMENT_SPEED = 2.5; 

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'KeyZ') moveF = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') moveB = true;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft' || e.code === 'KeyQ') moveL = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') moveR = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'KeyZ') moveF = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') moveB = false;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft' || e.code === 'KeyQ') moveL = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') moveR = false;
        });

        // --- LOAD NEW MODEL (.glb) ---
        const loader = new GLTFLoader();
        
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(model);
            
            // Center Camera on model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            controls.getObject().position.set(center.x, center.y + 5, center.z + 15);

            loading.style.display = 'none'; // Hide loading text when done

        }, undefined, function (error) {
            console.error(error);
            loading.innerText = "Error loading model. Check Console (F12).";
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (controls.isLocked) {
                if(moveF) controls.moveForward(MOVEMENT_SPEED);
                if(moveB) controls.moveForward(-MOVEMENT_SPEED);
                if(moveL) controls.moveRight(-MOVEMENT_SPEED);
                if(moveR) controls.moveRight(MOVEMENT_SPEED);
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
