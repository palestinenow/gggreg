<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Orbit - Working Filter Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Inter', sans-serif;
            transition: filter 0.3s ease;
        }
        
        #blocker { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 999; 
            cursor: pointer; 
        }
        #instructions { 
            color: white; 
            text-align: center; 
            padding: 30px; 
            border: 2px solid #fff; 
            border-radius: 10px; 
            background: #111; 
        }
        h1 { margin: 0 0 10px 0; color: #fff; } 
        p { margin: 0; color: #ccc; }
        
        #actions { 
            position: absolute; 
            bottom: 40px; 
            right: 40px; 
            z-index: 100; 
            display: flex; 
            gap: 15px; 
        }
        
        button.main-btn { 
            background: #1a1a1a; 
            color: #fff; 
            border: 1px solid #444; 
            padding: 15px 30px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px; 
            border-radius: 50px; 
            transition: all 0.3s ease; 
        }
        button.main-btn:hover { 
            background: #333; 
            transform: translateY(-2px); 
            border-color: #fff; 
        }
        
        #status { 
            position: absolute; 
            bottom: 40px; 
            left: 40px; 
            color: #fff; 
            font-size: 14px; 
            z-index: 100; 
            opacity: 0.7; 
        }
        
        /* Filter overlay layer - THIS IS THE MAGIC */
        #filter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 80;
            opacity: 0;
            transition: opacity 0.3s;
            mix-blend-mode: overlay;
        }
        
        /* Snow canvas */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 60;
            opacity: 0;
        }
        
        /* Grain canvas */
        #grain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 55;
            opacity: 0;
            mix-blend-mode: overlay;
        }
        
        /* Scanlines */
        #scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 65;
            opacity: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(255,255,255,0.05) 1px, transparent 2px, transparent 4px);
        }
        
        /* Letterbox bars */
        .letterbox {
            position: fixed;
            left: 0;
            width: 100%;
            height: 0;
            background: #000;
            z-index: 70;
            pointer-events: none;
            transition: height 0.5s;
        }
        .letterbox-top { top: 0; }
        .letterbox-bottom { bottom: 0; }
        
        /* Vignette */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.5) 100%);
        }
        
        /* Filter Lab Panel */
        #filter-lab {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 30, 0.95);
            color: #fff;
            padding: 20px;
            border-radius: 15px;
            font-family: 'Inter', sans-serif;
            z-index: 300;
            max-height: 85vh;
            overflow-y: auto;
            min-width: 320px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        
        #filter-lab h3 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .filter-category {
            margin-bottom: 20px;
        }
        
        .filter-category h4 {
            margin: 10px 0;
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.05);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            border-radius: 8px;
            transition: all 0.2s;
            text-align: center;
        }
        
        .filter-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }
        
        .filter-btn.active {
            background: #6366f1;
            color: #fff;
            border-color: #818cf8;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }
        
        #toggle-lab {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(99, 102, 241, 0.8);
            color: #fff;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            border-radius: 30px;
            z-index: 301;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }
        
        #toggle-lab:hover {
            background: #6366f1;
            transform: scale(1.05);
        }
        
        /* Glass Navigation Bar */
        .glass-nav {
            position: fixed;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 680px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 50px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            transition: all 1.2s;
            opacity: 0;
            pointer-events: none;
            z-index: 150;
        }

        .glass-nav.visible { opacity: 1; pointer-events: auto; }
        .glass-nav.vanish { opacity: 0; transform: translate(-50%, -50%) scale(0.94); filter: blur(12px); pointer-events: none; }
        
        .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.25); }
        .input-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
        .glass-input {
            width: 100%; background: transparent; border: none; outline: none;
            color: #fff; font-family: 'Inter', sans-serif; font-size: 0.95rem; text-align: center;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.5); }
        input[type="date"] { color-scheme: dark; cursor: pointer; }
        
        .conf-msg {
            font-family: 'Playfair Display', serif; color: #fff;
            font-size: 0.95rem; text-align: center; opacity: 0;
            transform: translateY(5px); transition: all 0.6s;
        }
        .conf-msg.show { opacity: 1; transform: translateY(0); }
        .conf-msg em { font-style: normal; color: #a5b4fc; }
        
        .send-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        .send-btn:hover { background: rgba(255,255,255,0.14); transform: scale(1.08); }
        .send-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
    </style>
</head>
<body id="main-body">

    <div id="blocker">
        <div id="instructions">
            <h1>🎬 CINEMATIC FILTER LAB</h1>
            <p>Click to start. All filters work 100%!</p>
        </div>
    </div>

    <div id="actions">
        <button class="main-btn" onclick="prevStation()">⬅️ PREVIOUS</button>
        <button class="main-btn" onclick="nextStation()">NEXT ➡️</button>
    </div>

    <div id="status">Ready...</div>
    
    <div id="filter-overlay"></div>
    <div id="vignette"></div>
    <canvas id="snow-canvas"></canvas>
    <canvas id="grain-canvas"></canvas>
    <div id="scanlines"></div>
    <div class="letterbox letterbox-top"></div>
    <div class="letterbox letterbox-bottom"></div>
    
    <!-- Glass Navigation Bar -->
    <nav class="glass-nav" id="glassNav">
        <div class="dot"></div>
        <div class="input-wrap" id="inputWrap"></div>
        <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
        <div class="dot"></div>
    </nav>
    
    <button id="toggle-lab" onclick="toggleFilterLab()">🎨 FILTER LAB (30+ WORKING)</button>
    
    <div id="filter-lab" style="display: none;">
        <h3>🎬 CINEMATIC FILTERS</h3>
        
        <div class="filter-category">
            <h4>🎨 COLOR GRADING</h4>
            <div class="filter-grid" id="color-filters"></div>
        </div>
        
        <div class="filter-category">
            <h4>✨ EFFECTS</h4>
            <div class="filter-grid" id="effect-filters"></div>
        </div>
        
        <div class="filter-category">
            <h4>📽️ FILM</h4>
            <div class="filter-grid" id="film-filters"></div>
        </div>
        
        <div class="filter-category">
            <h4>❄️ ATMOSPHERE</h4>
            <div class="filter-grid" id="atmosphere-filters"></div>
        </div>
        
        <div style="margin-top: 20px; text-align: center;">
            <button onclick="resetAllFilters()" style="background: #ef4444; color: #fff; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%;">🔄 RESET ALL FILTERS</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ========== FILTER SYSTEM ==========
        const activeFilters = new Set();
        
        // All filters with their CSS effects
        const filters = {
            // Color Grading
            'Teal & Orange': { css: 'contrast(1.1) saturate(1.3) sepia(0.3) hue-rotate(-20deg)' },
            'B&W': { css: 'grayscale(1) contrast(1.2)' },
            'Sepia': { css: 'sepia(0.8) contrast(1.1)' },
            'Cyberpunk': { css: 'contrast(1.4) saturate(1.5) hue-rotate(300deg) brightness(1.1)' },
            'Noir': { css: 'grayscale(1) contrast(1.5) brightness(0.8)' },
            'Vintage': { css: 'sepia(0.4) contrast(1.1) saturate(0.8) brightness(0.9)' },
            'Cool Blue': { css: 'hue-rotate(180deg) saturate(1.2) brightness(1.1)' },
            'Warm Glow': { css: 'sepia(0.3) saturate(1.3) brightness(1.1)' },
            'Matrix': { css: 'hue-rotate(90deg) saturate(1.5) contrast(1.2)' },
            'Sunset': { css: 'sepia(0.5) hue-rotate(-30deg) saturate(1.4) brightness(1.1)' },
            
            // Effects
            'Bloom': { bloom: true },
            'Glow': { bloom: true, pulse: true },
            'Invert': { css: 'invert(1)' },
            'Posterize': { css: 'contrast(1.5) brightness(0.9)' },
            'Edge Glow': { bloom: true, bloomStrength: 1.5 },
            'Dream Blur': { css: 'blur(1px) brightness(1.1)' },
            'Thermal': { css: 'hue-rotate(270deg) saturate(2) contrast(1.3)' },
            'Hologram': { css: 'hue-rotate(180deg) saturate(1.5) contrast(1.1) brightness(1.1)' },
            
            // Film
            'Film Grain': { grain: true },
            'Vignette': { vignette: true },
            'Letterbox': { letterbox: true },
            'Chromatic': { css: 'contrast(1.1)' },
            'Scanlines': { scanlines: true },
            'VHS Glitch': { css: 'contrast(1.2) saturate(1.1)' },
            
            // Atmosphere
            'Snow': { snow: true },
            'Fog': { css: 'brightness(1.2) contrast(0.9)' },
            'Rain': { css: 'brightness(0.9) contrast(1.1)' },
            'Dust': { css: 'brightness(1.1) contrast(0.95)' },
            'Stars': { css: 'brightness(1.1) contrast(1.1)' },
            'Aurora': { css: 'hue-rotate(30deg) saturate(1.4) brightness(1.1)' }
        };
        
        // Populate filter buttons
        function populateFilters() {
            const categories = {
                'color-filters': ['Teal & Orange', 'B&W', 'Sepia', 'Cyberpunk', 'Noir', 'Vintage', 'Cool Blue', 'Warm Glow', 'Matrix', 'Sunset'],
                'effect-filters': ['Bloom', 'Glow', 'Invert', 'Posterize', 'Edge Glow', 'Dream Blur', 'Thermal', 'Hologram'],
                'film-filters': ['Film Grain', 'Vignette', 'Letterbox', 'Chromatic', 'Scanlines', 'VHS Glitch'],
                'atmosphere-filters': ['Snow', 'Fog', 'Rain', 'Dust', 'Stars', 'Aurora']
            };
            
            for (const [containerId, filterNames] of Object.entries(categories)) {
                const container = document.getElementById(containerId);
                filterNames.forEach(name => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.textContent = name;
                    btn.dataset.filter = name;
                    btn.onclick = () => toggleFilter(name, btn);
                    container.appendChild(btn);
                });
            }
        }
        
        function toggleFilter(name, btn) {
            if (activeFilters.has(name)) {
                activeFilters.delete(name);
                btn.classList.remove('active');
            } else {
                activeFilters.add(name);
                btn.classList.add('active');
            }
            applyFilters();
        }
        
        function applyFilters() {
            const body = document.getElementById('main-body');
            const vignette = document.getElementById('vignette');
            const grain = document.getElementById('grain-canvas');
            const snow = document.getElementById('snow-canvas');
            const scanlines = document.getElementById('scanlines');
            const letterbox = document.querySelectorAll('.letterbox');
            
            // Reset
            body.style.filter = '';
            vignette.style.opacity = '0';
            grain.style.opacity = '0';
            snow.style.opacity = '0';
            scanlines.style.opacity = '0';
            letterbox[0].style.height = '0';
            letterbox[1].style.height = '0';
            
            let cssFilters = [];
            let hasBloom = false;
            let hasPulse = false;
            
            activeFilters.forEach(name => {
                const filter = filters[name];
                if (filter) {
                    if (filter.css) cssFilters.push(filter.css);
                    if (filter.vignette) vignette.style.opacity = '1';
                    if (filter.grain) grain.style.opacity = '0.15';
                    if (filter.snow) snow.style.opacity = '1';
                    if (filter.scanlines) scanlines.style.opacity = '0.3';
                    if (filter.letterbox) {
                        const h = window.innerHeight * 0.1 + 'px';
                        letterbox[0].style.height = h;
                        letterbox[1].style.height = h;
                    }
                    if (filter.bloom) hasBloom = true;
                    if (filter.pulse) hasPulse = true;
                }
            });
            
            body.style.filter = cssFilters.join(' ');
            
            // Update bloom
            if (hasBloom) {
                bloomPass.strength = hasPulse ? 0.5 : 0.3;
            } else {
                bloomPass.strength = 0;
            }
        }
        
        window.resetAllFilters = function() {
            activeFilters.clear();
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            applyFilters();
        };
        
        window.toggleFilterLab = function() {
            const lab = document.getElementById('filter-lab');
            lab.style.display = lab.style.display === 'none' ? 'block' : 'none';
        };
        
        populateFilters();

        // ========== SNOW ANIMATION ==========
        const snowCanvas = document.getElementById('snow-canvas');
        const snowCtx = snowCanvas.getContext('2d');
        let snowflakes = [];
        
        function initSnow() {
            snowCanvas.width = window.innerWidth;
            snowCanvas.height = window.innerHeight;
            snowflakes = [];
            for (let i = 0; i < 150; i++) {
                snowflakes.push({
                    x: Math.random() * snowCanvas.width,
                    y: Math.random() * snowCanvas.height,
                    r: Math.random() * 3 + 1,
                    s: Math.random() * 2 + 0.5,
                    o: Math.random() * 0.5 + 0.3
                });
            }
        }
        
        function animateSnow() {
            if (!activeFilters.has('Snow')) {
                requestAnimationFrame(animateSnow);
                return;
            }
            snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);
            snowflakes.forEach(f => {
                snowCtx.beginPath();
                snowCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                snowCtx.fillStyle = `rgba(255, 255, 255, ${f.o})`;
                snowCtx.fill();
                f.y += f.s;
                if (f.y > snowCanvas.height) {
                    f.y = 0;
                    f.x = Math.random() * snowCanvas.width;
                }
            });
            requestAnimationFrame(animateSnow);
        }
        
        // ========== GRAIN ANIMATION ==========
        const grainCanvas = document.getElementById('grain-canvas');
        const grainCtx = grainCanvas.getContext('2d');
        
        function initGrain() {
            grainCanvas.width = window.innerWidth;
            grainCanvas.height = window.innerHeight;
        }
        
        function animateGrain() {
            if (!activeFilters.has('Film Grain')) {
                requestAnimationFrame(animateGrain);
                return;
            }
            const imgData = grainCtx.createImageData(grainCanvas.width, grainCanvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const n = Math.random() * 255;
                data[i] = n;
                data[i+1] = n;
                data[i+2] = n;
                data[i+3] = 40;
            }
            grainCtx.putImageData(imgData, 0, 0);
            requestAnimationFrame(animateGrain);
        }

        // ========== GLASS NAV ==========
        const nav = document.getElementById('glassNav');
        const inputWrap = document.getElementById('inputWrap');
        const btn = document.getElementById('sendBtn');
        let step = 1;
        let navShown = false;

        function formatDate(d) {
            return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function initNav() {
            inputWrap.innerHTML = `<input type="text" class="glass-input" id="mainInput" placeholder="Make a wish..." autocomplete="off">`;
            const inp = document.getElementById('mainInput');
            if (inp) {
                inp.focus();
                inp.addEventListener('keydown', (e) => e.key === 'Enter' && handleSend());
            }
        }

        function handleSend() {
            const inp = document.querySelector('.glass-input');
            const val = inp?.value.trim();
            if (step === 1) {
                if (!val) return;
                step = 2;
                inputWrap.style.opacity = '0';
                setTimeout(() => {
                    inputWrap.innerHTML = `<input type="date" class="glass-input" id="dateInput" required>`;
                    inputWrap.style.opacity = '1';
                    document.getElementById('dateInput')?.focus();
                }, 250);
            } else if (step === 2) {
                if (!val) return;
                step = 3;
                const displayDate = formatDate(val);
                btn.style.opacity = '0';
                inputWrap.style.opacity = '0';
                setTimeout(() => {
                    inputWrap.innerHTML = `<p class="conf-msg">Come back on <em>${displayDate}</em>.<br>Your wish will come true.</p>`;
                    inputWrap.style.opacity = '1';
                    setTimeout(() => {
                        nav.classList.add('vanish');
                        nav.classList.remove('visible');
                        step = 1;
                        btn.style.opacity = '1';
                    }, 3500);
                }, 300);
            }
        }

        btn.addEventListener('click', handleSend);
        initNav();

        function showNavBar() {
            if (!navShown) {
                nav.classList.remove('vanish');
                nav.classList.add('visible');
                navShown = true;
                initNav();
            }
        }

        // ========== THREE.JS ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0;
        composer.addPass(bloomPass);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const spotLight = new THREE.SpotLight(0xffeeff, 2);
        spotLight.position.set(0, 10, 0);
        scene.add(spotLight);
        
        const centerLight = new THREE.PointLight(0xff00ff, 0.5, 10);
        centerLight.position.set(-0.006, 1.041, -0.008);
        scene.add(centerLight);

        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        let currentStationIndex = 0;
        let isAnimating = false;
        let animProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();

        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', (gltf) => {
            scene.add(gltf.scene);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
        });

        document.getElementById('blocker').addEventListener('click', function() {
            this.style.display = 'none';
        });

        window.nextStation = function() {
            if (isAnimating) return;
            currentStationIndex = currentStationIndex === 0 ? 1 : (currentStationIndex % (STATIONS.length - 1)) + 1;
            startAnimation(STATIONS[currentStationIndex].pos);
            if (currentStationIndex === 1) showNavBar();
        };

        window.prevStation = function() {
            if (isAnimating) return;
            currentStationIndex = currentStationIndex <= 1 ? STATIONS.length - 1 : currentStationIndex - 1;
            startAnimation(STATIONS[currentStationIndex].pos);
            if (currentStationIndex === 1) showNavBar();
        };

        function startAnimation(target) {
            isAnimating = true;
            animProgress = 0;
            startPos.copy(camera.position);
            endPos.copy(target);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isAnimating) {
                animProgress += 0.008;
                if (animProgress >= 1) {
                    animProgress = 1;
                    isAnimating = false;
                }
                const t = animProgress < 0.5 ? 4 * animProgress * animProgress * animProgress : 1 - Math.pow(-2 * animProgress + 2, 3) / 2;
                camera.position.lerpVectors(startPos, endPos, t);
                camera.lookAt(POINT_CENTER);
            }
            
            composer.render();
        }

        initSnow();
        initGrain();
        animateSnow();
        animateGrain();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            initSnow();
            initGrain();
        });
    </script>
</body>
</html>
