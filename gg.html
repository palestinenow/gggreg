<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Depth of Field</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Courier New', Courier, monospace; }
        
        /* MINIMAL DEBUG */
        #debug-panel {
            position: absolute; bottom: 20px; left: 20px; width: 250px;
            background: rgba(0, 0, 0, 0.6); color: #0f0; padding: 10px;
            border: 1px solid #0f0; border-radius: 4px; font-size: 13px;
            pointer-events: none; z-index: 100;
        }
        .row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .label { color: #aaa; } .val { font-weight: bold; }

        /* START SCREEN */
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.95);
            display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer;
        }
        #instructions {
            color: black; text-align: center; padding: 30px; border: 2px solid #0f0;
            border-radius: 10px; font-family: sans-serif; background: #fff;
        }

        /* CONTROLS */
        #actions { position: absolute; bottom: 30px; right: 30px; z-index: 100; }
        button.main-btn {
            background: #003300; color: #0f0; border: 2px solid #0f0;
            padding: 15px 30px; font-weight: bold; cursor: pointer;
            font-family: monospace; font-size: 20px; transition: 0.3s;
            box-shadow: 0 0 10px #0f0;
        }
        button.main-btn:hover { background: #0f0; color: black; transform: scale(1.1); box-shadow: 0 0 20px #0f0; }

        #flow-controls {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.9); padding: 15px;
            border: 1px solid #ccc; border-radius: 8px; z-index: 100;
            font-family: sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #flow-controls h3 { margin: 0 0 10px 0; font-size: 14px; color: #333; text-transform: uppercase; }
        .toggle-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 12px; color: #555; }
        .toggle-row input { margin-right: 8px; cursor: pointer; }
        .toggle-row label { cursor: pointer; user-select: none; }

        #status {
            position: absolute; bottom: 80px; left: 20px;
            color: #333; font-size: 16px; z-index: 100; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="debug-panel">
        <div class="row"><span class="label">STATION:</span> <span class="val" id="current-station">Intro</span></div>
        <div class="row"><span class="label">GLOW:</span> <span class="val" id="glow-val">0%</span></div>
    </div>

    <div id="blocker">
        <div id="instructions">
            <h1 style="color:#0f0; margin:0;">CLICK TO BEGIN</h1>
            <p style="margin-top:10px;">Cinematic orbit with Depth of Field.<br>Center is sharp, edges are blurry.</p>
        </div>
    </div>

    <!-- FLOW OPTIONS -->
    <div id="flow-controls">
        <h3>✨ Flow Effects</h3>
        <div class="toggle-row">
            <input type="checkbox" id="opt-arc" checked>
            <label for="opt-arc">Arcing Camera Path</label>
        </div>
        <div class="toggle-row">
            <input type="checkbox" id="opt-particles" checked>
            <label for="opt-particles">Floating Particles</label>
        </div>
        <div class="toggle-row">
            <input type="checkbox" id="opt-rays" checked>
            <label for="opt-rays">Rotating God Rays</label>
        </div>
        <div class="toggle-row">
            <input type="checkbox" id="opt-blur" checked>
            <label for="opt-blur">Depth of Field (Blur)</label>
        </div>
    </div>

    <div id="actions">
        <button class="main-btn" onclick="nextStation()">➡️ NEXT STATION</button>
    </div>

    <div id="status">Ready...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        // IMPORT BOKEH PASS FOR DEPTH OF FIELD
        import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- POST PROCESSING (BLOOM + BLUR) ---
        const renderScene = new RenderPass(scene, camera);

        // 1. BLOOM (Glow)
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.0;   
        bloomPass.radius = 0.8;

        // 2. BOKEH (Depth of Field / Blur)
        const bokehPass = new BokehPass(scene, camera, {
            focus: 10.0,       // Distance in units where image is sharp
            aperture: 0.0001,  // Size of aperture (higher = more blur)
            maxblur: 0.01,     // Maximum blur amount
            width: window.innerWidth,
            height: window.innerHeight
        });

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.addPass(bokehPass); // Add blur pass

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffeeff, 2);
        spotLight.position.set(0, 10, 0);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.decay = 1;
        spotLight.distance = 50;
        spotLight.castShadow = true;
        scene.add(spotLight);
        spotLight.target.position.set(-0.006, 1.041, -0.008);

        const centerLight = new THREE.PointLight(0xff00ff, 0, 10);
        centerLight.position.set(-0.006, 1.041, -0.008);
        scene.add(centerLight);

        // --- FLOW EFFECTS INITIALIZATION ---
        
        // 1. PARTICLES
        const particleCount = 200;
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 20;
            positions[i*3+1] = Math.random() * 10 + 1;
            positions[i*3+2] = (Math.random() - 0.5) * 20;
            velocities.push({ x: (Math.random() - 0.5) * 0.02, y: (Math.random() - 0.5) * 0.02, z: (Math.random() - 0.5) * 0.02 });
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particlesMaterial = new THREE.PointsMaterial({ color: 0xffaaee, size: 0.1, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particleSystem);

        // 2. GOD RAYS
        const rayGeometry = new THREE.CylinderGeometry(0.1, 0.5, 10, 8, 1, true);
        const rayMaterial = new THREE.MeshBasicMaterial({ color: 0xffffcc, transparent: true, opacity: 0.1, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
        const godRays = new THREE.Group();
        for (let i = 0; i < 6; i++) {
            const ray = new THREE.Mesh(rayGeometry, rayMaterial);
            ray.position.set(0, 10, 0);
            ray.rotation.y = (i / 6) * Math.PI * 2;
            ray.rotation.x = Math.PI / 6;
            godRays.add(ray);
        }
        scene.add(godRays);

        // --- STATIONS ---
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro",     pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First",  pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2",      pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3",      pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4",      pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5",      pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];

        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 3.0;

        // --- GLOW PULSE SYSTEM ---
        let glowStartTime = Date.now();
        let glowDurationUp = getRandomDuration();
        let glowDurationDown = getRandomDuration();
        let isGlowingUp = true;

        function getRandomDuration() { return 7000 + Math.random() * 15000; }

        function updateGlow() {
            const now = Date.now();
            const elapsed = now - glowStartTime;
            if (isGlowingUp) {
                const progress = Math.min(elapsed / glowDurationUp, 1);
                bloomPass.strength = progress * 2.0;
                centerLight.intensity = progress * 2.0;
                document.getElementById('glow-val').innerText = Math.round(progress * 100) + "%";
                if (progress >= 1) { isGlowingUp = false; glowStartTime = now; glowDurationDown = getRandomDuration(); }
            } else {
                const progress = Math.min(elapsed / glowDurationDown, 1);
                bloomPass.strength = (1 - progress) * 2.0;
                centerLight.intensity = (1 - progress) * 2.0;
                document.getElementById('glow-val').innerText = Math.round((1 - progress) * 100) + "%";
                if (progress >= 1) { isGlowingUp = true; glowStartTime = now; glowDurationUp = getRandomDuration(); }
            }
        }

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => {
                if (child.isMesh) { 
                    child.castShadow = true; child.receiveShadow = true; 
                    if (child.name.toLowerCase().includes('tree') || child.name.toLowerCase().includes('plant')) {
                        child.material.emissive = new THREE.Color(0xaa00aa);
                        child.material.emissiveIntensity = 0.5;
                    }
                }
            });
            scene.add(model);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
            updateUI();
        }, undefined, function (error) { console.error(error); });

        // --- UI & CONTROLS ---
        document.getElementById('blocker').addEventListener('click', function() { this.style.display = 'none'; document.getElementById('status').innerText = "Tour started."; });

        window.nextStation = function() {
            if (isAnimating) return;
            if (currentStationIndex === 0) currentStationIndex = 1;
            else currentStationIndex = (currentStationIndex % (STATIONS.length - 1)) + 1;
            startAnimation(STATIONS[currentStationIndex].pos);
            updateUI();
        };

        function startAnimation(targetPos) {
            isAnimating = true;
            animationProgress = 0;
            startPos.copy(camera.position);
            endPos.copy(targetPos);
            
            if (document.getElementById('opt-arc').checked) {
                const center = POINT_CENTER.clone();
                const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
                const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
                midPoint.add(direction.multiplyScalar(2));
                window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
            }
            
            document.getElementById('status').innerText = `Flowing to ${STATIONS[currentStationIndex].name}...`;
        }

        function updateUI() { document.getElementById('current-station').innerText = STATIONS[currentStationIndex].name; }

        function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            updateGlow();

            // Animate Particles
            if (document.getElementById('opt-particles').checked) {
                particleSystem.visible = true;
                const posAttr = particleSystem.geometry.attributes.position;
                for (let i = 0; i < particleCount; i++) {
                    posAttr.array[i*3] += velocities[i].x;
                    posAttr.array[i*3+1] += velocities[i].y;
                    posAttr.array[i*3+2] += velocities[i].z;
                    if (posAttr.array[i*3] > 10) posAttr.array[i*3] = -10;
                    if (posAttr.array[i*3] < -10) posAttr.array[i*3] = 10;
                    if (posAttr.array[i*3+1] > 12) posAttr.array[i*3+1] = 1;
                    if (posAttr.array[i*3+1] < 1) posAttr.array[i*3+1] = 12;
                    if (posAttr.array[i*3+2] > 10) posAttr.array[i*3+2] = -10;
                    if (posAttr.array[i*3+2] < -10) posAttr.array[i*3+2] = 10;
                }
                posAttr.needsUpdate = true;
            } else { particleSystem.visible = false; }

            // Rotate God Rays
            if (document.getElementById('opt-rays').checked) {
                godRays.visible = true;
                godRays.rotation.y += 0.002;
            } else { godRays.visible = false; }

            // UPDATE DEPTH OF FIELD FOCUS
            // We calculate distance from camera to tree and set focus there
            // This ensures the tree is ALWAYS sharp, and edges are blurry
            if (document.getElementById('opt-blur').checked) {
                bokehPass.enabled = true;
                const dist = camera.position.distanceTo(POINT_CENTER);
                bokehPass.uniforms['focus'].value = dist; 
            } else {
                bokehPass.enabled = false;
            }

            // Camera Movement
            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) {
                    animationProgress = 1;
                    isAnimating = false;
                    document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`;
                }

                const t = easeInOutCubic(animationProgress);
                
                if (document.getElementById('opt-arc').checked && window.animControlPoints) {
                    const p0 = window.animControlPoints.start;
                    const p1 = window.animControlPoints.mid;
                    const p2 = window.animControlPoints.end;
                    const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                    const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                    const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                    camera.position.set(x, y, z);
                } else {
                    camera.position.lerpVectors(startPos, endPos, t);
                }
                
                camera.lookAt(POINT_CENTER);
            }

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
