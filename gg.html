<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Point Collector - Center & Intro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Courier New', Courier, monospace; }
        
        /* DEBUG PANEL */
        #debug-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 320px;
            background: rgba(0, 0, 0, 0.85);
            color: #0f0;
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
        }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .label { color: #aaa; }
        .val { font-weight: bold; }
        h3 { margin-top: 0; color: white; border-bottom: 1px solid #0f0; padding-bottom: 5px; }

        /* CONTROLS OVERLAY */
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 999;
        }
        #instructions {
            color: white; text-align: center; cursor: pointer; padding: 30px; border: 2px solid #0f0; border-radius: 10px; font-family: sans-serif; background: #000;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: #0f0; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 50; box-shadow: 0 0 5px #0f0;
        }

        /* ACTION BUTTONS */
        #actions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        button {
            background: #003300;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            font-size: 16px;
        }
        button:hover { background: #0f0; color: black; }
        
        #saved-intro {
            margin-top: 10px;
            color: yellow;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- DEBUG DATA PANEL -->
    <div id="debug-panel">
        <h3>📍 CURRENT POSITION</h3>
        <div class="row"><span class="label">POS X:</span> <span class="val" id="p-x">0.00</span></div>
        <div class="row"><span class="label">POS Y:</span> <span class="val" id="p-y">0.00</span></div>
        <div class="row"><span class="label">POS Z:</span> <span class="val" id="p-z">0.00</span></div>
        
        <h3>🎯 POINT A: CENTER (FIXED)</h3>
        <div class="row"><span class="label">X:</span> <span class="val">-0.006</span></div>
        <div class="row"><span class="label">Y:</span> <span class="val">1.041</span></div>
        <div class="row"><span class="label">Z:</span> <span class="val">-0.008</span></div>

        <div id="saved-intro">
            <h3>🎬 POINT B: INTRO (SAVED)</h3>
            <div id="intro-coords"></div>
        </div>
    </div>

    <div id="crosshair"></div>

    <div id="blocker">
        <div id="instructions">
            <h1 style="color:#0f0">CLICK TO START</h1>
            <p>Z / W → Move Forward (Free Look)<br>S → Backward | A/Q ← Left | D → Right<br><br>Find your "Intro" spot and click SAVE.</p>
        </div>
    </div>

    <!-- ACTIONS -->
    <div id="actions">
        <button onclick="saveIntro()">📍 SET POINT B (INTRO)</button>
        <button onclick="goToCenter()">🚀 JUMP TO CENTER</button>
        <button onclick="goToIntro()">🚀 JUMP TO INTRO</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- DEFINED POINTS ---
        // Point A: Center (From your screenshot)
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        
        // Point B: Intro (Will be saved by you)
        let POINT_INTRO = null;

        // --- CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');

        document.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.display = 'none');
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');
        
        scene.add(controls.getObject());

        // --- MOVEMENT (FREE LOOK MODE) ---
        let moveF = false, moveB = false, moveL = false, moveR = false;
        const MOVEMENT_SPEED = 0.2; 

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'KeyZ') moveF = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') moveB = true;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft' || e.code === 'KeyQ') moveL = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') moveR = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'KeyZ') moveF = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') moveB = false;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft' || e.code === 'KeyQ') moveL = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') moveR = false;
        });

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => {
                if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
            });
            scene.add(model);
            
            // Start at Center
            controls.getObject().position.copy(POINT_CENTER).add(new THREE.Vector3(0, 2, 5));
        }, undefined, function (error) {
            console.error(error);
        });

        // --- BUTTON FUNCTIONS ---
        
        // 1. Save Point B (Intro)
        window.saveIntro = function() {
            const p = controls.getObject().position;
            POINT_INTRO = p.clone();
            
            // Show on screen
            const introDiv = document.getElementById('saved-intro');
            const coordsDiv = document.getElementById('intro-coords');
            introDiv.style.display = 'block';
            coordsDiv.innerHTML = `
                X: ${p.x.toFixed(3)}<br>
                Y: ${p.y.toFixed(3)}<br>
                Z: ${p.z.toFixed(3)}
            `;
            
            // Log for copying
            console.log("POINT B SAVED:", { x: p.x, y: p.y, z: p.z });
            alert("Point B (Intro) Saved! Check the panel or console.");
        };

        // 2. Jump to Center
        window.goToCenter = function() {
            controls.getObject().position.copy(POINT_CENTER).add(new THREE.Vector3(0, 2, 5));
        };

        // 3. Jump to Intro
        window.goToIntro = function() {
            if(POINT_INTRO) {
                controls.getObject().position.copy(POINT_INTRO);
            } else {
                alert("Save Point B first!");
            }
        };

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (controls.isLocked) {
                // Free Look Movement Logic
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                
                const right = new THREE.Vector3();
                right.crossVectors(camera.up, direction).normalize();

                if (moveF) controls.getObject().position.addScaledVector(direction, MOVEMENT_SPEED);
                if (moveB) controls.getObject().position.addScaledVector(direction, -MOVEMENT_SPEED);
                if (moveL) controls.getObject().position.addScaledVector(right, -MOVEMENT_SPEED);
                if (moveR) controls.getObject().position.addScaledVector(right, MOVEMENT_SPEED);
            }
            
            // Update Debug UI
            const p = controls.getObject().position;
            document.getElementById('p-x').innerText = p.x.toFixed(3);
            document.getElementById('p-y').innerText = p.y.toFixed(3);
            document.getElementById('p-z').innerText = p.z.toFixed(3);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
