<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethera | Beyond silence, we build the eternal</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes fadeRise {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-rise { animation: fadeRise 0.8s ease-out forwards; }
        .animate-fade-rise-delay { animation: fadeRise 0.8s ease-out 0.2s forwards; opacity: 0; }
        .animate-fade-rise-delay-2 { animation: fadeRise 0.8s ease-out 0.4s forwards; opacity: 0; }
        .hover-scale-103:hover { transform: scale(1.03); transition: transform 0.3s ease-out; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        
        #landing-page { transition: opacity 0.8s ease-out, visibility 0.8s ease-out; }
        #landing-page.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        #three-canvas-container { 
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #three-canvas-container.visible { display: block; }
        
        #three-canvas-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* Ensure UI elements are above canvas */
        #actions, #status, #vignette, #glassNav, #toggle-panel, #control-panel {
            position: fixed;
            z-index: 10;
        }
    </style>
</head>
<body>
    <!-- LANDING PAGE -->
    <div id="landing-page">
        <div id="root"></div>
    </div>

    <!-- 3D TOUR CONTAINER -->
    <div id="three-canvas-container">
        <!-- Three.js canvas will be appended here -->
    </div>
    
    <!-- Navigation Buttons -->
    <div id="actions" style="display: none;">
        <button class="hydro-btn" id="prevBtn" onclick="prevStation()" style="position: fixed; left: 40px; top: 50%; transform: translateY(-50%);">
            <span class="hydro-btn-content">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 18px; height: 18px;">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                </svg>
                <span>Previous</span>
            </span>
        </button>
        <button class="hydro-btn" id="nextBtn" onclick="nextStation()" style="position: fixed; right: 40px; top: 50%; transform: translateY(-50%);">
            <span class="hydro-btn-content">
                <span>Next</span>
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 18px; height: 18px;">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                </svg>
            </span>
        </button>
    </div>

    <div id="status" style="display: none; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); color: #333; font-size: 16px; z-index: 100; opacity: 0.7; font-family: 'Inter', sans-serif;">Ready...</div>
    
    <div id="vignette" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; background: radial-gradient(circle at center, transparent 51%, rgba(0,0,0,0.30) 80%, rgba(0,0,0,0.50) 100%);"></div>
    
    <button id="toggle-panel" onclick="toggleControlPanel()" style="display: none; position: fixed; top: 20px; right: 20px; background: #003300; color: #0f0; border: 2px solid #0f0; padding: 10px 20px; cursor: pointer; font-family: monospace; font-weight: bold; border-radius: 5px; z-index: 201;">🎮 CONTROLS</button>
    
    <div id="control-panel" style="display: none; position: fixed; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); color: #0f0; padding: 20px; border-radius: 10px; font-family: monospace; z-index: 200; max-height: 90vh; overflow-y: auto; min-width: 300px; border: 2px solid #0f0;">
        <h3 style="margin: 0 0 15px 0; text-align: center; color: #0f0; border-bottom: 1px solid #0f0; padding-bottom: 10px;">🎛️ DEBUG CONTROLS</h3>
        <p style="color: #0f0; font-size: 12px;">Tour is active</p>
    </div>

    <!-- React Landing Page Code -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const Navigation = () => {
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 10);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/80 backdrop-blur-md shadow-sm' : 'bg-transparent'}`}>
                    <div className="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
                        <div className="text-3xl tracking-tight text-black" style={{ fontFamily: 'Instrument Serif, serif' }}>
                            Aethera<sup className="text-sm align-super">®</sup>
                        </div>
                        <div className="hidden md:flex items-center space-x-8">
                            <a href="#home" className="text-sm text-black">Home</a>
                            <a href="#studio" className="text-sm text-[#6F6F6F]">Studio</a>
                            <a href="#about" className="text-sm text-[#6F6F6F]">About</a>
                        </div>
                        <button 
                            className="rounded-full px-6 py-2.5 text-sm bg-black text-white hover:scale-105 transition-all duration-300"
                            onClick={() => window.startTourFromLanding()}
                        >
                            Join
                        </button>
                    </div>
                </nav>
            );
        };

        const HeroSection = () => {
            return (
                <div className="relative min-h-screen w-full overflow-hidden bg-white">
                    <div className="absolute inset-0 z-0 bg-white" />
                    <div className="absolute inset-0 z-[1] bg-gradient-to-b from-white via-white/95 to-white pointer-events-none" />
                    <div className="relative z-10">
                        <Navigation />
                    </div>
                    <div className="relative z-10 flex flex-col items-center justify-center text-center px-6"
                         style={{ paddingTop: 'calc(8rem - 75px)', paddingBottom: '10rem' }}>
                        <h1 className="animate-fade-rise text-5xl sm:text-7xl md:text-8xl max-w-7xl font-normal leading-[0.95] tracking-[-2.46px]"
                            style={{ fontFamily: 'Instrument Serif, serif' }}>
                            Beyond <span className="text-[#6F6F6F]">silence,</span> we build
                            <br />
                            the <span className="text-[#6F6F6F]">eternal.</span>
                        </h1>
                        <p className="animate-fade-rise-delay text-base sm:text-lg max-w-2xl mt-8 leading-relaxed text-[#6F6F6F]"
                           style={{ fontFamily: 'Inter, sans-serif' }}>
                            Building platforms for brilliant minds, fearless makers, and thoughtful souls.
                        </p>
                        <button
                            className="animate-fade-rise-delay-2 rounded-full px-14 py-5 text-base mt-12 bg-black text-white hover:scale-105 transition-all duration-300"
                            style={{ fontFamily: 'Inter, sans-serif' }}
                            onClick={() => window.startTourFromLanding()}
                        >
                            Join
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="App">
                    <HeroSection />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- Three.js Imports -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, bloomPass;
        let cards = [];
        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 2.5;
        
        const cardPositions = {
            2: { x: 0.10, y: 1.20, z: 4.00 },
            3: { x: 3.60, y: 1.25, z: 1.20 },
            4: { x: 2.20, y: 1.20, z: -3.20 },
            5: { x: -2.20, y: 1.25, z: -2.70 }
        };

        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067) },
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727) },
            { name: "D: 2", pos: new THREE.Vector3(0.077, 1.301, 5.964) },
            { name: "E: 3", pos: new THREE.Vector3(5.276, 1.338, 1.737) },
            { name: "F: 4", pos: new THREE.Vector3(3.257, 1.258, -4.664) },
            { name: "G: 5", pos: new THREE.Vector3(-3.403, 1.240, -4.008) }
        ];
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);

        window.startTourFromLanding = function() {
            console.log('🚀 Starting tour...');
            
            const landingPage = document.getElementById('landing-page');
            landingPage.classList.add('hidden');
            
            const canvasContainer = document.getElementById('three-canvas-container');
            canvasContainer.classList.add('visible');
            
            document.getElementById('actions').style.display = 'flex';
            document.getElementById('status').style.display = 'block';
            document.getElementById('vignette').style.display = 'block';
            document.getElementById('toggle-panel').style.display = 'block';
            
            initAndStartTour();
        };

        window.initAndStartTour = function() {
            console.log('🎨 Initializing Three.js scene...');
            
            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0xffffff);
                
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                
                const container = document.getElementById('three-canvas-container');
                container.appendChild(renderer.domElement);
                console.log('✅ Canvas appended to DOM');
                
                const renderScene = new RenderPass(scene, camera);
                bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
                bloomPass.threshold = 0.1;
                bloomPass.strength = 0.23;
                bloomPass.radius = 0.8;
                
                composer = new EffectComposer(renderer);
                composer.addPass(renderScene);
                composer.addPass(bloomPass);
                
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
                scene.add(ambientLight);
                
                const spotLight = new THREE.SpotLight(0xffeeff, 2);
                spotLight.position.set(0, 10, 0);
                spotLight.angle = Math.PI / 4;
                spotLight.penumbra = 0.5;
                spotLight.decay = 1;
                spotLight.distance = 50;
                spotLight.castShadow = true;
                scene.add(spotLight);
                
                const centerLight = new THREE.PointLight(0xff00ff, 0.46, 10);
                centerLight.position.set(-0.006, 1.041, -0.008);
                scene.add(centerLight);
                
                createCards();
                loadModel();
                
                camera.position.copy(STATIONS[0].pos);
                camera.lookAt(POINT_CENTER);
                
                animate();
                
                window.addEventListener('resize', onWindowResize);
                
                console.log('✅ Tour initialized successfully!');
                document.getElementById('status').innerText = 'Welcome to the tour';
                
            } catch (error) {
                console.error('❌ Error initializing tour:', error);
                document.getElementById('status').innerText = 'Error loading tour';
            }
        };

        function createCards() {
            for (let i = 2; i < STATIONS.length; i++) {
                const card = createCard(STATIONS[i].name, i);
                cards[i] = card;
                scene.add(card);
            }
            positionCards();
        }
        
        function createCard(stationName, stationIndex) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            context.fillStyle = 'rgba(255, 255, 255, 0.05)';
            context.fillRect(0, 0, 512, 512);
            
            context.font = 'bold 70px Arial';
            context.fillStyle = '#ffffff';
            context.textAlign = 'center';
            context.fillText(stationName, 256, 256);
            
            const pageTexture = new THREE.CanvasTexture(canvas);
            
            const pageMaterial = new THREE.MeshBasicMaterial({
                map: pageTexture,
                transparent: true,
                opacity: 0.0,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            
            const pageGeometry = new THREE.PlaneGeometry(1.8, 1.8);
            return new THREE.Mesh(pageGeometry, pageMaterial);
        }
        
        function positionCards() {
            for (let i = 2; i <= 5; i++) {
                if (cards[i] && cardPositions[i]) {
                    cards[i].position.set(cardPositions[i].x, cardPositions[i].y, cardPositions[i].z);
                    cards[i].lookAt(POINT_CENTER);
                }
            }
        }

        function loadModel() {
            const loader = new GLTFLoader();
            loader.load('./environment_vr_room_baked.glb', function (gltf) {
                const model = gltf.scene;
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.name.toLowerCase().includes('tree')) {
                            child.material.emissive = new THREE.Color(0xaa00aa);
                            child.material.emissiveIntensity = 0.5;
                        }
                    }
                });
                scene.add(model);
                console.log('✅ 3D Model loaded successfully');
            }, undefined, function (error) {
                console.error('❌ Error loading model:', error);
                document.getElementById('status').innerText = 'Model loading error - check console';
            });
        }

        window.nextStation = function() {
            if (isAnimating || !scene) return;
            if (currentStationIndex === 0) {
                currentStationIndex = 1;
            } else if (currentStationIndex < STATIONS.length - 1) {
                currentStationIndex++;
            } else {
                currentStationIndex = 1;
            }
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
        };

        window.prevStation = function() {
            if (isAnimating || !scene) return;
            if (currentStationIndex === 0) {
                currentStationIndex = STATIONS.length - 1;
            } else if (currentStationIndex > 1) {
                currentStationIndex--;
            } else {
                currentStationIndex = STATIONS.length - 1;
            }
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
        };

        function startAnimation(targetPos) {
            isAnimating = true;
            animationProgress = 0;
            startPos.copy(camera.position);
            endPos.copy(targetPos);
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2));
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (!scene) return;
            
            for (let i = 2; i < cards.length; i++) {
                if (cards[i]) {
                    if (i === currentStationIndex) {
                        cards[i].lookAt(camera.position);
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.8, 0.1);
                    } else {
                        cards[i].material.opacity = THREE.MathUtils.lerp(cards[i].material.opacity, 0.0, 0.1);
                    }
                }
            }

            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) {
                    animationProgress = 1;
                    isAnimating = false;
                    document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`;
                }
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start;
                const p1 = window.animControlPoints.mid;
                const p2 = window.animControlPoints.end;
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }

            composer.render();
        }

        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) {
                composer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        window.toggleControlPanel = function() {
            const panel = document.getElementById('control-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        };
    </script>
</body>
</html>
