<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Orbit - Elegant Floating Text</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* START SCREEN */
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.95);
            display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer;
        }
        #instructions {
            color: black; text-align: center; padding: 30px; border: 1px solid #eee;
            border-radius: 10px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { margin: 0 0 10px 0; color: #333; font-weight: 300; letter-spacing: 2px; }
        p { margin: 0; color: #666; font-size: 14px; }

        /* MAIN BUTTON */
        #actions { position: absolute; bottom: 40px; right: 40px; z-index: 100; }
        button.main-btn {
            background: transparent; color: #333; border: 1px solid #333; padding: 15px 30px;
            font-weight: 300; cursor: pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        button.main-btn:hover { background: #333; color: #fff; }

        #status { position: absolute; bottom: 40px; left: 40px; color: #999; font-size: 12px; z-index: 100; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- START SCREEN -->
    <div id="blocker">
        <div id="instructions">
            <h1>CINEMATIC TOUR</h1>
            <p>Click to begin the journey.</p>
        </div>
    </div>

    <!-- MAIN ACTION -->
    <div id="actions">
        <button class="main-btn" onclick="nextStation()">Next View ➡️</button>
    </div>

    <div id="status">Ready...</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambientLight);
        const spotLight = new THREE.SpotLight(0xffeeff, 2); spotLight.position.set(0, 10, 0); spotLight.angle = Math.PI / 4; spotLight.penumbra = 0.5; spotLight.decay = 1; spotLight.distance = 50; spotLight.castShadow = true; scene.add(spotLight); spotLight.target.position.set(-0.006, 1.041, -0.008);
        const centerLight = new THREE.PointLight(0xff00ff, 1, 10); centerLight.position.set(-0.006, 1.041, -0.008); scene.add(centerLight);

        // --- HELPER TO CREATE ELEGANT WHITE TEXT ---
        function createElegantText(textTitle, textSub) {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const context = canvas.getContext('2d');
            
            // Transparent Background
            
            // Fine White Text Title
            context.font = '300 80px Helvetica, Arial, sans-serif'; // Thin font
            context.fillStyle = '#FFFFFF'; 
            context.textAlign = 'center';
            context.fillText(textTitle.toUpperCase(), 256, 200);
            
            // Subtitle
            context.font = '300 40px Helvetica, Arial, sans-serif';
            context.fillStyle = '#CCCCCC'; // Light Grey
            context.fillText(textSub, 256, 260);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ 
                map: texture, transparent: true, opacity: 1.0, side: THREE.DoubleSide, depthWrite: false 
            });
            const geometry = new THREE.PlaneGeometry(2.5, 2.5);
            const mesh = new THREE.Mesh(geometry, material);
            
            // Store initial Y for floating animation
            mesh.userData.initialY = mesh.position.y;
            mesh.userData.floatOffset = Math.random() * 100; // Random start time
            
            return mesh;
        }

        // --- CREATE CARDS ---
        
        // 1. Intro Card
        const cardIntro = createElegantText("Welcome", "The Beginning");
        cardIntro.position.set(0.092, 9.5, -0.067); 
        cardIntro.lookAt(new THREE.Vector3(-0.006, 9.5, -0.008)); 
        const qIntro = cardIntro.quaternion.clone();

        // 2. Card C
        const cardC = createElegantText("Viewpoint C", "First Stop");
        cardC.position.set(-3.49, 1.30, 1.23); 
        cardC.lookAt(new THREE.Vector3(-0.006, 1.30, -0.008)); 
        const qC = cardC.quaternion.clone();

        // 3. Card D
        const cardD = createElegantText("Viewpoint D", "Second Stop");
        cardD.position.set(0.077, 1.30, 4.0); 
        cardD.lookAt(new THREE.Vector3(-0.006, 1.30, -0.008)); 
        const qD = cardD.quaternion.clone();

        // 4. Card E
        const cardE = createElegantText("Viewpoint E", "Third Stop");
        cardE.position.set(3.77, 1.30, 1.30); 
        cardE.lookAt(new THREE.Vector3(-0.006, 1.30, -0.008)); 
        const qE = cardE.quaternion.clone();

        // 5. Card F
        const cardF = createElegantText("Viewpoint F", "Fourth Stop");
        cardF.position.set(2.21, 1.30, -3.16); 
        cardF.lookAt(new THREE.Vector3(-0.006, 1.30, -0.008)); 
        const qF = cardF.quaternion.clone();

        scene.add(cardIntro); scene.add(cardC); scene.add(cardD); scene.add(cardE); scene.add(cardF);

        // --- STATIONS (Order: Intro -> G:5(Empty) -> C -> D -> E -> F) ---
        const POINT_CENTER = new THREE.Vector3(-0.006, 1.041, -0.008);
        const STATIONS = [
            { name: "Intro", pos: new THREE.Vector3(0.092, 8.581, -0.067), card: cardIntro, quat: qIntro },
            { name: "G: Wide View", pos: new THREE.Vector3(-3.403, 1.240, -4.008), card: null }, // EMPTY STATION
            { name: "C: First", pos: new THREE.Vector3(-5.325, 1.356, 1.727), card: cardC, quat: qC },
            { name: "D: Second", pos: new THREE.Vector3(0.077, 1.301, 5.964), card: cardD, quat: qD },
            { name: "E: Third", pos: new THREE.Vector3(5.276, 1.338, 1.737), card: cardE, quat: qE },
            { name: "F: Fourth", pos: new THREE.Vector3(3.257, 1.258, -4.664), card: cardF, quat: qF }
        ];

        let currentStationIndex = 0;
        let isAnimating = false;
        let animationProgress = 0;
        let startPos = new THREE.Vector3();
        let endPos = new THREE.Vector3();
        const ANIMATION_DURATION = 3.0; // Slightly slower for elegance

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; if (child.name.toLowerCase().includes('tree')) { child.material.emissive = new THREE.Color(0xaa00aa); child.material.emissiveIntensity = 0.5; } } });
            scene.add(model);
            camera.position.copy(STATIONS[0].pos);
            camera.lookAt(POINT_CENTER);
        }, undefined, function (error) { console.error(error); });

        // --- UI LOGIC ---
        document.getElementById('blocker').addEventListener('click', function() { this.style.display = 'none'; document.getElementById('status').innerText = "Tour Started"; });

        window.nextStation = function() {
            if (isAnimating) return;
            
            // Move to next index
            currentStationIndex = (currentStationIndex + 1) % STATIONS.length;
            
            startAnimation(STATIONS[currentStationIndex].pos);
            document.getElementById('status').innerText = `Moving to ${STATIONS[currentStationIndex].name}...`;
        };

        function startAnimation(targetPos) {
            isAnimating = true; animationProgress = 0; startPos.copy(camera.position); endPos.copy(targetPos);
            const center = POINT_CENTER.clone();
            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
            const direction = new THREE.Vector3().subVectors(midPoint, center).normalize();
            midPoint.add(direction.multiplyScalar(2)); 
            window.animControlPoints = { start: startPos, mid: midPoint, end: endPos };
        }

        function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.002; // Time for floating

            // TEXT CARD LOGIC
            STATIONS.forEach(station => {
                if(station.card) {
                    const dist = camera.position.distanceTo(station.pos);
                    
                    // FLOATING ANIMATION (Small Bobbing)
                    station.card.position.y = station.userData.initialY + Math.sin(time + station.userData.floatOffset) * 0.1;

                    if (dist < 2.5) {
                        // AT STATION: Face Camera & 100% Opacity
                        station.card.lookAt(camera.position);
                        station.card.material.opacity = THREE.MathUtils.lerp(station.card.material.opacity, 1.0, 0.1);
                    } else {
                        // AWAY: Return to Original Rotation & 10% Opacity (Ghostly)
                        station.card.quaternion.slerp(station.quat, 0.1);
                        station.card.material.opacity = THREE.MathUtils.lerp(station.card.material.opacity, 0.1, 0.1);
                    }
                }
            });

            if (isAnimating) {
                animationProgress += 0.016 / ANIMATION_DURATION;
                if (animationProgress >= 1) { animationProgress = 1; isAnimating = false; document.getElementById('status').innerText = `Arrived at ${STATIONS[currentStationIndex].name}`; }
                const t = easeInOutCubic(animationProgress);
                const p0 = window.animControlPoints.start; const p1 = window.animControlPoints.mid; const p2 = window.animControlPoints.end;
                const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                camera.position.set(x, y, z);
                camera.lookAt(POINT_CENTER);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
