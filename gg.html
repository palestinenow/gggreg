<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed LookAt Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Courier New', Courier, monospace; }
        
        /* DEBUG PANEL */
        #debug-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 300px;
            background: rgba(0, 0, 0, 0.85);
            color: #0f0;
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
        }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .label { color: #aaa; }
        .val { font-weight: bold; }
        h3 { margin-top: 0; color: white; border-bottom: 1px solid #0f0; padding-bottom: 5px; }

        /* CONTROLS OVERLAY */
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 999;
        }
        #instructions {
            color: white; text-align: center; cursor: pointer; padding: 30px; border: 2px solid #0f0; border-radius: 10px; font-family: sans-serif; background: #000;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: red; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 50; box-shadow: 0 0 5px red;
        }
    </style>
</head>
<body>

    <!-- DEBUG DATA PANEL -->
    <div id="debug-panel">
        <h3>📍 CAMERA POSITION</h3>
        <div class="row"><span class="label">POS X:</span> <span class="val" id="p-x">0.00</span></div>
        <div class="row"><span class="label">POS Y:</span> <span class="val" id="p-y">0.00</span></div>
        <div class="row"><span class="label">POS Z:</span> <span class="val" id="p-z">0.00</span></div>
        
        <h3>🎯 FIXED TARGET (LOOK AT)</h3>
        <div class="row"><span class="label">TARGET X:</span> <span class="val" style="color:#fff">-0.006</span></div>
        <div class="row"><span class="label">TARGET Y:</span> <span class="val" style="color:#fff">1.041</span></div>
        <div class="row"><span class="label">TARGET Z:</span> <span class="val" style="color:#fff">-0.008</span></div>
    </div>

    <div id="crosshair"></div>

    <div id="blocker">
        <div id="instructions">
            <h1 style="color:#0f0">CLICK TO START</h1>
            <p>W / Z → Move Forward<br>S → Backward | A/Q ← Left | D → Right<br><br>Camera is LOCKED to target.<br>You orbit around it.</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- THE FIXED TARGET FROM YOUR SCREENSHOT ---
        const lookAtTarget = new THREE.Vector3(-0.006, 1.041, -0.008);

        // --- CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');

        document.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.display = 'none');
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');
        
        scene.add(controls.getObject());

        // --- MOVEMENT ---
        let moveF = false, moveB = false, moveL = false, moveR = false;
        const MOVEMENT_SPEED = 0.2; 

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'KeyZ') moveF = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') moveB = true;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft' || e.code === 'KeyQ') moveL = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') moveR = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'KeyZ') moveF = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') moveB = false;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft' || e.code === 'KeyQ') moveL = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') moveR = false;
        });

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('./environment_vr_room_baked.glb', function (gltf) {
            const model = gltf.scene;
            model.traverse((child) => {
                if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
            });
            scene.add(model);
            
            // Start Position (Orbiting around the target)
            controls.getObject().position.set(0, 2, 5); 
        }, undefined, function (error) {
            console.error(error);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (controls.isLocked) {
                // 1. Calculate Movement Direction relative to Camera
                // We need to know which way is "Forward" relative to where we are LOOKING
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                
                // Flatten direction to horizontal plane for walking (so we don't fly up/down)
                direction.y = 0;
                direction.normalize();

                const right = new THREE.Vector3();
                right.crossVectors(camera.up, direction).normalize();

                // 2. Apply Movement
                if (moveF) controls.getObject().position.addScaledVector(direction, MOVEMENT_SPEED);
                if (moveB) controls.getObject().position.addScaledVector(direction, -MOVEMENT_SPEED);
                if (moveL) controls.getObject().position.addScaledVector(right, -MOVEMENT_SPEED);
                if (moveR) controls.getObject().position.addScaledVector(right, MOVEMENT_SPEED);

                // 3. FORCE CAMERA TO LOOK AT TARGET
                // This overrides any mouse looking. The camera always points to the Vector3 we defined.
                camera.lookAt(lookAtTarget);
            }
            
            // Update Debug UI
            const p = controls.getObject().position;
            document.getElementById('p-x').innerText = p.x.toFixed(3);
            document.getElementById('p-y').innerText = p.y.toFixed(3);
            document.getElementById('p-z').innerText = p.z.toFixed(3);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
