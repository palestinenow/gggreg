<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Tour - Working Version</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap');
        
        body { margin: 0; overflow: hidden; background: #f5f5f5; font-family: sans-serif; }
        
        #blocker { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: rgba(255,255,255,0.95); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 999; 
            cursor: pointer; 
            transition: opacity 0.5s ease;
        }
        
        #blocker.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #instructions { 
            color: black; 
            text-align: center; 
            padding: 40px; 
            border: 2px solid #333; 
            border-radius: 10px; 
            background: #fff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        
        h1 { margin: 0 0 10px 0; color: #333; font-size: 32px; }
        p { margin: 0; color: #666; font-size: 16px; }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #status { 
            position: fixed; 
            bottom: 40px; 
            left: 50%;
            transform: translateX(-50%);
            color: #333; 
            font-size: 16px; 
            z-index: 100; 
            opacity: 0.7;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1>CINEMATIC TOUR</h1>
            <p>Click anywhere to start<br>Hydro Ripple + Dynamic Effects</p>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div id="status">Click to start...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // === SCENE SETUP ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f5);
        scene.fog = new THREE.Fog(0xf5f5f5, 10, 50);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // === BLOOM EFFECT ===
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.23;
        bloomPass.radius = 0.8;
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // === LIGHTS ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffeeff, 2);
        spotLight.position.set(0, 10, 0);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.decay = 1;
        spotLight.distance = 50;
        scene.add(spotLight);

        // === SIMPLE GEOMETRY (Fallback if model doesn't load) ===
        const geometry = new THREE.TorusKnotGeometry(2, 0.6, 100, 16);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xaa00aa,
            roughness: 0.3,
            metalness: 0.7,
            emissive: 0x220022
        });
        const torusKnot = new THREE.Mesh(geometry, material);
        scene.add(torusKnot);

        // Add some particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 30;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: 0xff00ff,
            transparent: true,
            opacity: 0.8
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        camera.position.set(0, 0, 8);

        // === BLOOM ANIMATION ===
        let bloomStartTime = Date.now();
        let bloomDuration = 7000 + Math.random() * 13000;
        let bloomIsIncreasing = true;
        let BLOOM_MIN = 0.0;
        let BLOOM_MAX = 0.23;
        
        function updateBloom() {
            const now = Date.now();
            const elapsed = now - bloomStartTime;
            
            if (bloomIsIncreasing) {
                const progress = Math.min(elapsed / bloomDuration, 1);
                const strength = BLOOM_MIN + (BLOOM_MAX - BLOOM_MIN) * progress;
                bloomPass.strength = strength;
                
                if (progress >= 1) {
                    bloomIsIncreasing = false;
                    bloomStartTime = now;
                    bloomDuration = 7000 + Math.random() * 13000;
                }
            } else {
                const progress = Math.min(elapsed / bloomDuration, 1);
                const strength = BLOOM_MAX - (BLOOM_MAX - BLOOM_MIN) * progress;
                bloomPass.strength = strength;
                
                if (progress >= 1) {
                    bloomIsIncreasing = true;
                    bloomStartTime = now;
                    bloomDuration = 7000 + Math.random() * 13000;
                }
            }
        }

        // === START HANDLER ===
        document.getElementById('blocker').addEventListener('click', function() {
            this.classList.add('hidden');
            document.getElementById('status').innerText = "Tour Started - Click anywhere to pause/play bloom";
            
            setTimeout(() => {
                this.style.display = 'none';
            }, 500);
        });

        // === ANIMATION LOOP ===
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            updateBloom();
            
            // Animate torus knot
            time += 0.01;
            torusKnot.rotation.x = time * 0.3;
            torusKnot.rotation.y = time * 0.5;
            
            // Animate particles
            particlesMesh.rotation.y = time * 0.05;
            
            composer.render();
        }
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
