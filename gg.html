<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Portfolio - Scroll & Move</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    
    /* Loading Screen */
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: white; font-size: 20px; pointer-events: none;
    }

    /* UI Overlay for Potions */
    .ui-layer {
      position: absolute; bottom: 30px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 20px;
      pointer-events: none; /* Let clicks pass through empty space */
    }
    .potion-btn {
      pointer-events: auto;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid white;
      color: white;
      font-size: 24px; font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }
    .potion-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }
    .potion-btn.active { background: #ff0055; border-color: #ff0055; box-shadow: 0 0 15px #ff0055; }

    /* Instructions */
    .instructions {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 14px; pointer-events: none;
      background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px;
    }
  </style>
</head>
<body>

  <div id="loading">Loading 3D World...</div>
  
  <div class="instructions">
    🖱️ Drag to Look | 📜 Scroll to Move Forward/Back | 🔘 Click Buttons to Jump
  </div>

  <div class="ui-layer">
    <button class="potion-btn active" onclick="jumpTo('home')">1</button>
    <button class="potion-btn" onclick="jumpTo('center')">2</button>
    <button class="potion-btn" onclick="jumpTo('close')">3</button>
    <button class="potion-btn" onclick="jumpTo('high')">4</button>
  </div>

  <!-- Import Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- CONFIGURATION ---
    const MODEL_PATH = './droid-workshop-kitchen.gltf';
    
    // Define where the buttons take you (Adjust these numbers to fit your model!)
    const CAMERAS = {
      home:   { pos: [0, 10, 30],  target: [0, 0, 0] },   // Wide shot
      center: { pos: [0, 5, 10],   target: [0, 2, 0] },   // Middle of room
      close:  { pos: [5, 2, 5],    target: [0, 1, 0] },   // Close up on object
      high:   { pos: [0, 20, 10],  target: [0, 0, 0] }    // Bird's eye view
    };

    let scene, camera, renderer, controls;
    let targetPos = new THREE.Vector3();
    let targetLook = new THREE.Vector3();
    let isMoving = false;

    init();
    animate();

    function init() {
      // 1. Scene Setup
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x202025);
      scene.fog = new THREE.Fog(0x202025, 20, 100);

      // 2. Camera
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      
      // 3. Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // 4. Controls (OrbitControls allows dragging to look around)
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground
      controls.minDistance = 2;
      controls.maxDistance = 60;

      // 5. Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(10, 20, 10);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      scene.add(dirLight);

      // 6. Load Model
      const loader = new GLTFLoader();
      loader.load(MODEL_PATH, 
        (gltf) => {
          const model = gltf.scene;
          
          // Enable shadows for all meshes
          model.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              
              // DEBUG: Check if texture is missing
              if(child.material && !child.material.map && child.material.name !== '') {
                console.warn("Mesh has no texture:", child.name);
              }
            }
          });

          scene.add(model);
          
          // Center the model
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          
          // Adjust controls target to center of model
          controls.target.copy(center);
          controls.update();

          // Set initial camera position
          jumpTo('home', false); // false = instant jump, no animation

          document.getElementById('loading').style.display = 'none';
        },
        (progress) => {
          // Optional: Show loading progress
          // console.log((progress.loaded / progress.total * 100) + '% loaded');
        },
        (error) => {
          console.error(error);
          document.getElementById('loading').innerText = "Error loading model. Check console.";
        }
      );

      // 7. Event Listeners
      window.addEventListener('resize', onWindowResize);
      window.addEventListener('wheel', onScrollMove);
      
      // Expose jump function to window for HTML buttons
      window.jumpTo = jumpTo;
    }

    // --- MOVEMENT LOGIC ---

    function jumpTo(key, animate = true) {
      if (!CAMERAS[key]) return;

      // Update UI Buttons
      document.querySelectorAll('.potion-btn').forEach(btn => btn.classList.remove('active'));
      // Find button by index (simple mapping)
      const keys = Object.keys(CAMERAS);
      const index = keys.indexOf(key);
      if(index >= 0) {
        document.querySelectorAll('.potion-btn')[index].classList.add('active');
      }

      const camData = CAMERAS[key];
      
      if (animate) {
        // Start smooth transition
        isMoving = true;
        // We will interpolate towards these targets in the animate loop
        targetPos.set(...camData.pos);
        targetLook.set(...camData.target);
      } else {
        // Instant set
        camera.position.set(...camData.pos);
        controls.target.set(...camData.target);
        controls.update();
      }
    }

    function onScrollMove(event) {
      // Move camera forward/backward based on scroll
      // We move along the direction the camera is facing, but flatten Y so we don't fly into sky
      
      const speed = 0.5;
      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      direction.y = 0; // Keep movement horizontal
      direction.normalize();

      // DeltaY is positive when scrolling down (move forward)
      // DeltaY is negative when scrolling up (move back)
      const moveDist = event.deltaY * 0.01 * speed;

      camera.position.addScaledVector(direction, moveDist);
      
      // Also move the controls target so we keep looking at roughly the same spot relative to us
      controls.target.addScaledVector(direction, moveDist);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- ANIMATION LOOP ---
    function animate() {
      requestAnimationFrame(animate);

      // Smoothly interpolate camera if a button was clicked
      if (isMoving) {
        camera.position.lerp(targetPos, 0.05);
        controls.target.lerp(targetLook, 0.05);
        
        // Stop animating if close enough
        if (camera.position.distanceTo(targetPos) < 0.1) {
          isMoving = false;
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
